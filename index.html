    const modules = [
      {
        id: 1, tier: "free", icon: "📘", color: "#22c55e",
        title: "Introduction to SAP FICO",
        description: "Understand the foundation of SAP Financial Accounting & Controlling.",
        lessons: [
          { id: "1a", title: "What is SAP FICO?", duration: "10 min", content: `SAP FICO stands for Financial Accounting (FI) and Controlling (CO). It is one of the most important modules in SAP ERP.\n\n**Financial Accounting (FI):** Records all financial transactions externally. It provides financial statements like Balance Sheet and P&L.\n\n**Controlling (CO):** Handles internal reporting. It helps management make business decisions by tracking costs and revenues.\n\n**Key Transaction Codes:**\n• FB01 – Post a document\n• FB50 – G/L account document entry\n• F-02 – Enter G/L account posting\n• S_ALR_87012284 – Financial Statements` },
          { id: "1b", title: "SAP FICO Architecture & Integration", duration: "12 min", content: `SAP FICO integrates tightly with other SAP modules:\n\n**FI integrates with:**\n• MM (Materials Management) – for goods receipt and invoice verification\n• SD (Sales & Distribution) – for billing and revenue posting\n• HR (Human Resources) – for payroll postings\n• PP (Production Planning) – for production cost postings\n\n**Key Organizational Elements:**\n• Client – Highest level in SAP\n• Company Code – Legal entity for financial reporting\n• Business Area – Optional segment reporting\n• Chart of Accounts – List of all GL accounts\n\n**Transaction Codes:**\n• OX02 – Create Company Code\n• OBY6 – Company Code Global Settings\n• OB13 – Create Chart of Accounts` },
          { id: "1c", title: "Navigation & Basic Settings", duration: "8 min", content: `**SAP GUI Navigation:**\nThe SAP Easy Access Menu is the starting point. You can navigate using:\n• Menu paths\n• Transaction codes (T-codes)\n• Favorites\n\n**Entering Transaction Codes:**\nType the T-code in the command field at the top left.\n• /n + T-code = opens in same window\n• /o + T-code = opens in new window\n\n**Important Settings T-codes:**\n• SM30 – Table maintenance\n• SE16 – Data browser\n• SU01 – User administration\n• SPRO – SAP Implementation Guide (Customizing)` },
        ],
        quiz: [
          { q: "What does FI in SAP FICO stand for?", options: ["Financial Integration", "Financial Accounting", "Fiscal Intelligence", "Fund Investment"], answer: 1 },
          { q: "Which T-code is used to post a GL document?", options: ["FB50", "F110", "ME21N", "VA01"], answer: 0 },
          { q: "What is the highest organizational level in SAP?", options: ["Company Code", "Plant", "Client", "Business Area"], answer: 2 },
        ]
      },
      {
        id: 2, tier: "free", icon: "📗", color: "#3b82f6",
        title: "General Ledger (GL) Accounting",
        description: "Master GL postings, chart of accounts, and financial statements.",
        lessons: [
          { id: "2a", title: "Chart of Accounts & GL Master Data", duration: "15 min", content: `**Chart of Accounts (COA):**\nA chart of accounts is a list of all GL accounts used by a company code.\n\n**Types of COA:**\n• Operative COA – Used for daily postings\n• Country-Specific COA – For legal requirements\n• Group COA – For consolidation purposes\n\n**GL Account Master Data has two views:**\n1. Chart of Accounts view (account number, name, account type)\n2. Company Code view (currency, tax category, field status group)\n\n**Key T-codes:**\n• FS00 – Create/Change/Display GL Account\n• OBD4 – Define Account Groups\n• OB53 – Define Retained Earnings Account\n• FSP0 – GL Account in COA view\n• FSS0 – GL Account in Company Code view` },
          { id: "2b", title: "Document Posting & Park/Hold", duration: "14 min", content: `**SAP Document Principle:**\nEvery business transaction creates a document with a header and line items.\n\n**Document Types (examples):**\n• SA – GL account document\n• KR – Vendor invoice\n• DR – Customer invoice\n• ZP – Payment posting\n\n**Park vs. Hold:**\n• Park (FBV0) – Saves incomplete document, updates reports\n• Hold (FB00) – Saves locally, no report impact\n\n**Key T-codes:**\n• FB50 – Enter GL posting\n• FB03 – Display document\n• FB08 – Reverse document\n• FBCJ – Cash Journal` },
          { id: "2c", title: "Financial Statement Versions", duration: "10 min", content: `**Financial Statement Version (FSV):**\nDefines the structure for Balance Sheet and P&L reporting.\n\n**T-codes for Reports:**\n• S_ALR_87012284 – Financial Statements\n• S_ALR_87012291 – GL Account Balances\n• S_ALR_87012282 – Compact Journal\n• FAGLB03 – New GL: Display Balances` },
        ],
        quiz: [
          { q: "Which T-code creates a GL Master Account?", options: ["FS01", "FS00", "OBD4", "FB50"], answer: 1 },
          { q: "What document type is used for GL account documents?", options: ["KR", "DR", "SA", "ZP"], answer: 2 },
          { q: "What is the difference between Park and Hold?", options: ["No difference", "Park updates reports, Hold does not", "Hold updates reports, Park does not", "Both update reports"], answer: 1 },
        ]
      },
      {
        id: 3, tier: "premium", icon: "📙", color: "#f59e0b",
        title: "Accounts Payable (AP)",
        description: "Vendor master data, invoice processing, and payment runs.",
        lessons: [
          { id: "3a", title: "Vendor Master Data", duration: "12 min", content: `**Vendor Master Data** is maintained at three levels:\n1. General Data (name, address, bank details)\n2. Company Code Data (reconciliation account, payment terms)\n3. Purchasing Organization Data (used if MM is active)\n\n**Key T-codes:**\n• FK01 – Create Vendor\n• FK02 – Change Vendor\n• XK01 – Create Vendor (Centrally)` },
          { id: "3b", title: "Invoice Processing & Credit Memos", duration: "15 min", content: `**Vendor Invoice Entry:**\nInvoices are posted against vendor accounts. The system automatically updates the reconciliation account.\n\n**Key T-codes:**\n• FB60 – Enter Vendor Invoice\n• FB65 – Enter Vendor Credit Memo\n• MIRO – Invoice Verification (with PO)\n• FB03 – Display FI Document` },
          { id: "3c", title: "Automatic Payment Program (F110)", duration: "20 min", content: `**F110 – Automatic Payment Program Steps:**\n1. Enter Parameters\n2. Proposal Run\n3. Edit Proposal\n4. Payment Run\n5. Print\n\n**Configuration T-codes:**\n• FBZP – Maintain Payment Program\n• OB41 – Define Posting Keys` },
        ],
        quiz: [
          { q: "Which T-code is used for Automatic Payment Run?", options: ["F-53", "F110", "MIRO", "FB60"], answer: 1 },
          { q: "What links AP subledger to the GL?", options: ["Payment Terms", "Reconciliation Account", "Document Type", "Posting Key"], answer: 1 },
          { q: "Which document type is used for Vendor Invoice?", options: ["SA", "DR", "KR", "KG"], answer: 2 },
        ]

        title: "Accounts Receivable (AR)",
        description: "Customer master, billing, dunning, and collections.",
        lessons: [
          { id: "4a", title: "Customer Master Data", duration: "12 min", content: `**Customer Master Data** levels:\n1. General Data\n2. Company Code Data\n3. Sales Area Data\n\n**Key T-codes:**\n• FD01 – Create Customer\n• FD02 – Change Customer\n• XD01 – Create Customer Centrally\n• FBL5N – Customer Line Items` },
          { id: "4b", title: "Invoice & Credit Processing", duration: "14 min", content: `**AR Document Types:**\n• DR – Customer Invoice\n• DG – Customer Credit Memo\n• DZ – Customer Payment\n\n**Key T-codes:**\n• FB70 – Enter Customer Invoice\n• FB75 – Enter Customer Credit Memo\n• F-28 – Post Incoming Payment\n• F-32 – Manual Clearing` },
          { id: "4c", title: "Dunning Program", duration: "12 min", content: `**Dunning Levels:**\n• Level 1 – Friendly reminder\n• Level 2 – Second notice\n• Level 3 – Final notice\n• Level 4 – Legal action warning\n\n**T-codes:**\n• F150 – Dunning Program\n• OB61 – Define Dunning Procedures` },
        ],
        quiz: [
          { q: "Which T-code runs the Dunning Program?", options: ["F110", "F150", "FB70", "F-28"], answer: 1 },
          { q: "What document type is used for Customer Invoice?", options: ["KR", "SA", "DR", "DZ"], answer: 2 },
          { q: "What is the purpose of clearing in AR?", options: ["Posting new invoices", "Matching invoices with payments", "Creating credit memos", "Dunning customers"], answer: 1 },
        ]
      },
      {
        id: 5, tier: "premium", icon: "🏭", color: "#8b5cf6",
        title: "Controlling (CO)",
        description: "Cost center accounting, planning, and internal orders.",
        lessons: [
          { id: "5a", title: "CO Organizational Structure", duration: "10 min", content: `**CO Master Data:**\n• Cost Center – Where costs are incurred\n• Profit Center – Business segments\n• Internal Order – Short-term cost collectors\n• Cost Element – CO equivalent of GL account\n\n**Key T-codes:**\n• KS01 – Create Cost Center\n• KA01 – Create Cost Element\n• KE51 – Create Profit Center` },
          { id: "5b", title: "Cost Center Planning", duration: "15 min", content: `**KP06 – Change Cost Center Planning**\n\n**Reports:**\n• KSB1 – Cost Center Actual Line Items\n• S_ALR_87013611 – Cost Centers: Actual/Plan/Variance\n• KSBL – Cost Center Planning Report` },
          { id: "5c", title: "Internal Orders", duration: "14 min", content: `**Internal Orders** monitor costs of projects and events.\n\n**Order Lifecycle:**\nCreated → Released → Completed → Closed\n\n**Key T-codes:**\n• KO01 – Create Internal Order\n• KO88 – Settle Internal Order\n• KOB1 – Internal Order Actual Line Items` },
        ],
        quiz: [
          { q: "What is the central organizational unit in CO?", options: ["Company Code", "Plant", "Controlling Area", "Business Area"], answer: 2 },
          { q: "Which T-code creates a Cost Center?", options: ["KA01", "KS01", "KE51", "KO01"], answer: 1 },
          { q: "What does Internal Order settlement do?", options: ["Creates new orders", "Transfers costs to receivers", "Deletes the order", "Locks the order"], answer: 1 },
        ]
      },
      {
        id: 6, tier: "premium", icon: "🏗️", color: "#06b6d4",
        title: "Asset Accounting (AA)",
        description: "Fixed asset lifecycle, depreciation, and year-end closing.",
        lessons: [
          { id: "6a", title: "Asset Master Data & Classes", duration: "12 min", content: `**Asset Class** groups similar assets (Machinery, Buildings, Vehicles).\n\n**Key T-codes:**\n• AS01 – Create Asset Master\n• AS02 – Change Asset Master\n• AS03 – Display Asset Master\n• OAOA – Asset Class Configuration` },
          { id: "6b", title: "Asset Transactions", duration: "14 min", content: `**Asset Acquisition:** F-90 or MIRO\n**Asset Transfer:** ABUMN\n**Asset Retirement:** ABAON\n\n**Key T-codes:**\n• F-90 – Asset acquisition from vendor\n• ABUMN – Asset transfer\n• ABAON – Asset retirement without revenue` },
          { id: "6c", title: "Depreciation & Year-End Closing", duration: "15 min", content: `**Depreciation Keys:**\n• LINR – Straight-line\n• DEGR – Declining balance\n• GWG – Low-value assets\n\n**Year-End Closing Steps:**\n1. AFAB – Final depreciation run\n2. AJAB – Close fiscal year\n3. AJRW – Open new fiscal year\n\n**Reports:**\n• AW01N – Asset Explorer\n• S_ALR_87011963 – Asset Balances` },
        ],
        quiz: [
          { q: "Which T-code runs the depreciation program?", options: ["AJAB", "AFAB", "AW01N", "AS01"], answer: 1 },
          { q: "What depreciation key means Straight-Line?", options: ["DEGR", "GWG", "LINR", "MANU"], answer: 2 },
          { q: "Which T-code is the Asset Explorer?", options: ["AS03", "AW01N", "S_ALR_87011963", "ABUMN"], answer: 1 },
        ]
      },
    ];

    function Certificate({user,unlockedByAdmin,onClose}){
      const ref=useRef();
      const today=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
      const certId="FICO-"+Math.abs(user.email.split("").reduce((a,c)=>a+c.charCodeAt(0),0)).toString().padStart(6,"0");
      const total=modules.reduce((s,m)=>s+m.lessons.length,0);
      const done=Object.keys(user.progress||{}).filter(k=>!k.startsWith("quiz_")).length;
      const pct=Math.round(done/total*100);
      const ok=pct>=80||unlockedByAdmin;

      function print(){
        const el=ref.current; if(!el) return;
        const w=window.open("","_blank");
        w.document.write(`<html><head><title>Certificate - ${user.name}</title><style>body{margin:0;padding:20px;background:#fff;font-family:Georgia,serif;}</style></head><body>${el.outerHTML}</body></html>`);
        w.document.close(); w.focus(); setTimeout(()=>w.print(),600);
      }

      if(!ok) return (
        <div style={{position:"fixed",inset:0,background:"#000000aa",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:20,padding:40,maxWidth:440,textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:12}}>🔒</div>
            <h3 style={{color:"#f1f5f9",margin:"0 0 10px"}}>Certificate Locked</h3>
            <p style={{color:"#64748b",marginBottom:12}}>Complete at least <strong style={{color:"#f59e0b"}}>80% of all lessons</strong> to earn your certificate.</p>
            <div style={{background:"#0f172a",borderRadius:10,padding:16,marginBottom:20}}>
              <div style={{color:"#94a3b8",fontSize:13,marginBottom:8}}>Progress: {pct}% ({done}/{total} lessons)</div>
              <PBar value={done} max={total} color="#f59e0b"/>
            </div>
            <p style={{color:"#475569",fontSize:12,marginBottom:20}}>Or ask your admin to unlock it manually.</p>
            <button onClick={onClose} style={{padding:"10px 28px",background:"#334155",border:"none",borderRadius:10,color:"#94a3b8",cursor:"pointer",fontWeight:700}}>Close</button>
          </div>
        </div>
      );

      return (
        <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
          <div style={{maxWidth:800,width:"100%"}}>
            <div ref={ref} style={{background:"#fffdf7",border:"12px solid #1e3a5f",borderRadius:4,padding:"48px 56px",textAlign:"center",position:"relative",fontFamily:"Georgia,serif",boxShadow:"0 0 0 4px #c9a84c,0 0 0 8px #1e3a5f"}}>
              {["top-left","top-right","bottom-left","bottom-right"].map(p=>(
                <div key={p} style={{position:"absolute",top:p.includes("top")?12:"auto",bottom:p.includes("bottom")?12:"auto",left:p.includes("left")?12:"auto",right:p.includes("right")?12:"auto",width:40,height:40,borderTop:p.includes("top")?"3px solid #c9a84c":"none",borderBottom:p.includes("bottom")?"3px solid #c9a84c":"none",borderLeft:p.includes("left")?"3px solid #c9a84c":"none",borderRight:p.includes("right")?"3px solid #c9a84c":"none"}}/>
              ))}
              <div style={{color:"#c9a84c",fontSize:13,letterSpacing:5,fontFamily:"Arial",textTransform:"uppercase",marginBottom:6}}>✦ FICO Academy Gulf ✦</div>
              <div style={{fontSize:36,fontWeight:"bold",color:"#1e3a5f",letterSpacing:2,marginBottom:4}}>Certificate of Completion</div>
              <div style={{width:200,height:2,background:"linear-gradient(90deg,transparent,#c9a84c,transparent)",margin:"12px auto 24px"}}/>
              <div style={{color:"#64748b",fontSize:14,marginBottom:8,fontFamily:"Arial"}}>This is to certify that</div>
              <div style={{fontSize:32,color:"#1e3a5f",fontStyle:"italic",borderBottom:"2px solid #c9a84c",display:"inline-block",paddingBottom:4,marginBottom:16,minWidth:280}}>{user.name}</div>
              <div style={{color:"#475569",fontSize:14,lineHeight:1.8,marginBottom:20,fontFamily:"Arial"}}>has successfully completed the</div>
              <div style={{fontSize:20,fontWeight:"bold",color:"#1e3a5f",background:"#f0f4ff",border:"2px solid #1e3a5f22",borderRadius:8,padding:"10px 28px",display:"inline-block",marginBottom:20}}>SAP FICO Professional Training Program</div>
              <div style={{color:"#64748b",fontSize:13,marginBottom:28,fontFamily:"Arial"}}>covering Financial Accounting (FI) · Controlling (CO) · Asset Accounting (AA)</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginTop:20}}>
                <div style={{textAlign:"center"}}><div style={{width:160,borderBottom:"1px solid #94a3b8",marginBottom:6}}/><div style={{color:"#1e3a5f",fontWeight:"bold",fontSize:13,fontFamily:"Arial"}}>Kulsoom — FICO Academy</div><div style={{color:"#94a3b8",fontSize:11,fontFamily:"Arial"}}>Founder & Instructor</div></div>
                <div style={{textAlign:"center"}}><div style={{width:70,height:70,borderRadius:"50%",border:"3px solid #1e3a5f",background:"#1e3a5f",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 6px",color:"#c9a84c",fontSize:26}}>🎓</div><div style={{color:"#94a3b8",fontSize:10,fontFamily:"Arial"}}>CERTIFIED</div></div>

    function LessonViewer({lesson,onBack,onComplete,done}){
      const lines=lesson.content.split("\n");
      return (
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <button onClick={onBack} style={bkBtn}>← Back to Module</button>
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:28}}>
            <h2 style={{color:"#f1f5f9",margin:"0 0 6px",fontSize:20}}>{lesson.title}</h2>
            <div style={{color:"#64748b",fontSize:13,marginBottom:24}}>⏱ {lesson.duration}</div>
            <div style={{color:"#cbd5e1",lineHeight:1.9,fontSize:15}}>
              {lines.map((line,i)=>{
                if(!line.trim())return <br key={i}/>;
                if(line.startsWith("**")&&line.endsWith("**"))return <div key={i} style={{color:"#f1f5f9",fontWeight:700,fontSize:16,marginTop:16,marginBottom:4}}>{line.replace(/\*\*/g,"")}</div>;
                if(line.startsWith("•"))return <div key={i} style={{paddingLeft:16,color:"#94a3b8",marginBottom:2}}><span style={{color:"#3b82f6"}}>▸</span>{line.slice(1)}</div>;
                return <p key={i} style={{margin:"6px 0"}}>{line}</p>;
              })}
            </div>
            {done
              ?<div style={{marginTop:24,color:"#22c55e",fontWeight:700}}>✅ Completed</div>
              :<button onClick={onComplete} style={{marginTop:24,padding:"12px 28px",background:"linear-gradient(90deg,#22c55e,#16a34a)",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>✅ Mark as Complete</button>
            }
          </div>
        </div>
      );
    }

    function Quiz({mod,onBack,onScore}){
      const [cur,setCur]=useState(0);
      const [sel,setSel]=useState(null);
      const [answers,setAnswers]=useState([]);
      const [done,setDone]=useState(false);
      function next(){
        if(sel===null)return;
        const na=[...answers,{q:cur,sel}];
        if(cur+1<mod.quiz.length){setAnswers(na);setCur(cur+1);setSel(null);}
        else{const sc=na.filter(a=>a.sel===mod.quiz[a.q].answer).length;setAnswers(na);setDone(true);onScore(mod.id,sc,mod.quiz.length);}
      }
      if(done){
        const sc=answers.filter(a=>a.sel===mod.quiz[a.q].answer).length;
        return (
          <div style={{maxWidth:600,margin:"0 auto"}}>
            <button onClick={onBack} style={bkBtn}>← Back</button>
            <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:36,textAlign:"center"}}>
              <div style={{fontSize:56,marginBottom:12}}>{sc===mod.quiz.length?"🏆":sc>1?"👍":"📚"}</div>
              <h2 style={{color:"#f1f5f9",fontSize:24}}>{sc}/{mod.quiz.length} Correct</h2>
              <p style={{color:"#64748b",marginBottom:20}}>{sc===mod.quiz.length?"Perfect! Well done.":"Review the lessons and try again!"}</p>
              {mod.quiz.map((q,i)=>(
                <div key={i} style={{background:"#0f172a",borderRadius:10,padding:14,marginTop:10,textAlign:"left"}}>
                  <div style={{color:"#94a3b8",fontSize:13,marginBottom:4}}>Q{i+1}: {q.q}</div>
                  <div style={{color:answers[i].sel===q.answer?"#22c55e":"#f87171",fontSize:13}}>
                    {answers[i].sel===q.answer?"✅ Correct":`❌ Wrong — Correct: ${q.options[q.answer]}`}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }
      const q=mod.quiz[cur];
      return (
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <button onClick={onBack} style={bkBtn}>← Back</button>
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:28}}>
            <div style={{color:"#64748b",fontSize:12,marginBottom:8}}>Question {cur+1} of {mod.quiz.length}</div>
            <PBar value={cur} max={mod.quiz.length} color="#3b82f6"/>
            <h3 style={{color:"#f1f5f9",fontSize:17,margin:"18px 0"}}>{q.q}</h3>
            {q.options.map((o,i)=>(
              <div key={i} onClick={()=>setSel(i)} style={{padding:"13px 16px",borderRadius:10,marginBottom:8,cursor:"pointer",border:`2px solid ${sel===i?"#3b82f6":"#334155"}`,background:sel===i?"#1d3a5e":"#0f172a",color:"#cbd5e1",fontSize:14,transition:"all 0.15s"}}>
                {String.fromCharCode(65+i)}. {o}
              </div>
            ))}
            <button onClick={next} disabled={sel===null} style={{width:"100%",marginTop:8,padding:"12px 0",background:sel!==null?"linear-gradient(90deg,#3b82f6,#6366f1)":"#1e293b",border:"none",borderRadius:10,color:sel!==null?"#fff":"#475569",fontWeight:700,cursor:sel!==null?"pointer":"default"}}>
              {cur+1<mod.quiz.length?"Next Question →":"Finish Quiz"}
            </button>
          </div>
        </div>
      );
    }

    function TCodeRef(){

                            <div style={{color:isCorrect?"#22c55e":"#f59e0b",fontWeight:700,fontSize:13,marginBottom:6}}>{isCorrect?"🏆 Correct!":"📚 Explanation:"}</div>
                            <div style={{color:"#94a3b8",fontSize:13,lineHeight:1.7}}>{q.explanation}</div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── TRANSACTION SIMULATOR ────────────────────────────────────────────────
    function TransactionSim({isPremium}){
      const [module,setModule]=useState("AP");
      const [mode,setMode]=useState("list"); // list | guided | practice | result
      const [activeScenario,setActiveScenario]=useState(null);
      const [step,setStep]=useState(0);
      const [values,setValues]=useState({});
      const [checked,setChecked]=useState({});
      const [score,setScore]=useState(0);
      const [practiceSubmitted,setPracticeSubmitted]=useState(false);

      const scenarios=simScenarios[module];

      function startGuided(sc){
        setActiveScenario(sc);setStep(0);setValues({});setChecked({});setMode("guided");
      }
      function startPractice(sc){
        setActiveScenario(sc);setValues({});setChecked({});setPracticeSubmitted(false);setScore(0);setMode("practice");
      }
      function nextStep(){
        if(step<activeScenario.fields.length-1) setStep(step+1);
        else setMode("result");
      }
      function submitPractice(){
        let sc=0;
        const ch={};
        activeScenario.fields.forEach(f=>{
          const correct=(values[f.id]||"").trim().toLowerCase()===f.correct.toLowerCase();
          ch[f.id]=correct;
          if(correct)sc++;
        });
        setChecked(ch);setScore(sc);setPracticeSubmitted(true);
      }

      const iStyle2={width:"100%",padding:"10px 14px",background:"#0f172a",border:"1px solid #334155",borderRadius:10,color:"#f1f5f9",fontSize:14,outline:"none",boxSizing:"border-box"};

      // Result screen
      if(mode==="result") return (
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <button onClick={()=>{setMode("list");setActiveScenario(null);}} style={bkBtn}>← Back</button>
          <div style={{background:"#1e293b",border:"1px solid #22c55e44",borderRadius:16,padding:32,textAlign:"center"}}>
            <div style={{fontSize:56,marginBottom:12}}>🎉</div>
            <h2 style={{color:"#22c55e",margin:"0 0 8px"}}>Transaction Complete!</h2>
            <div style={{background:"#0f172a",borderRadius:12,padding:20,margin:"20px 0",textAlign:"left"}}>
              <div style={{color:"#22c55e",fontWeight:700,fontSize:14,marginBottom:8}}>📋 System Message:</div>
              <div style={{color:"#94a3b8",fontSize:14,lineHeight:1.8}}>{activeScenario.result}</div>
            </div>
            <div style={{background:"#1e3a5f22",border:"1px solid #3b82f633",borderRadius:12,padding:20,textAlign:"left"}}>
              <div style={{color:"#3b82f6",fontWeight:700,fontSize:14,marginBottom:8}}>📚 What SAP Did Behind the Scenes:</div>
              <div style={{color:"#94a3b8",fontSize:13,lineHeight:1.8}}>{activeScenario.learning}</div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={()=>startPractice(activeScenario)} style={{padding:"12px 24px",background:"linear-gradient(90deg,#f59e0b,#d97706)",border:"none",borderRadius:10,color:"#1e3a5f",fontWeight:700,cursor:"pointer"}}>
                🎯 Try Free Practice Mode
              </button>
              <button onClick={()=>{setMode("list");setActiveScenario(null);}} style={{padding:"12px 24px",background:"#334155",border:"none",borderRadius:10,color:"#94a3b8",fontWeight:700,cursor:"pointer"}}>
                ← Back to List
              </button>
            </div>
          </div>
        </div>
      );

      // Guided mode
      if(mode==="guided") {
        const field=activeScenario.fields[step];
        const progress=Math.round((step/activeScenario.fields.length)*100);
        return (
          <div style={{maxWidth:700,margin:"0 auto"}}>
            <button onClick={()=>setMode("list")} style={bkBtn}>← Back</button>
            <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:24,marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <span style={{fontSize:28}}>{activeScenario.icon}</span>
                <div>
                  <div style={{color:"#f1f5f9",fontWeight:700,fontSize:17}}>{activeScenario.title}</div>
                  <div style={{color:"#64748b",fontSize:12}}>T-Code: {activeScenario.tcode} · Guided Mode</div>
                </div>
              </div>
              <div style={{background:"#0f172a",borderRadius:10,padding:14,color:"#94a3b8",fontSize:13,lineHeight:1.7,marginBottom:14}}>{activeScenario.description}</div>
              <div style={{color:"#475569",fontSize:12,marginBottom:6}}>Step {step+1} of {activeScenario.fields.length}</div>
              <PBar value={step} max={activeScenario.fields.length} color="#3b82f6"/>
            </div>

            {/* SAP Screen simulation */}
            <div style={{background:"#1e2d1e",border:"2px solid #22c55e44",borderRadius:16,padding:24}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                <div style={{background:"#22c55e22",border:"1px solid #22c55e44",borderRadius:8,padding:"4px 12px",color:"#22c55e",fontSize:11,fontWeight:700}}>SAP {activeScenario.tcode}</div>
                <div style={{color:"#475569",fontSize:12}}>{activeScenario.title}</div>
              </div>

              <div style={{color:"#f59e0b",fontWeight:700,fontSize:14,marginBottom:6}}>👉 Enter: {field.label}</div>
              <div style={{color:"#64748b",fontSize:12,marginBottom:12}}>💡 Hint: {field.hint}</div>

              <input value={values[field.id]||""} onChange={e=>setValues({...values,[field.id]:e.target.value})}
                placeholder={field.placeholder} style={iStyle2}
                onKeyDown={e=>e.key==="Enter"&&(values[field.id]||"").trim()&&nextStep()}/>

              {/* Show filled fields */}
              {step>0&&(
                <div style={{marginTop:16,padding:12,background:"#0f1f0f",borderRadius:10}}>
                  <div style={{color:"#475569",fontSize:11,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Entered so far:</div>
                  {activeScenario.fields.slice(0,step).map(f=>(
                    <div key={f.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1a2e1a"}}>
                      <div style={{color:"#475569",fontSize:12}}>{f.label}</div>
                      <div style={{color:"#22c55e",fontSize:12,fontWeight:600}}>{values[f.id]}</div>
                    </div>
                  ))}
                </div>
              )}

              <button onClick={nextStep} disabled={!(values[field.id]||"").trim()} style={{
                width:"100%",marginTop:16,padding:"12px 0",
                background:(values[field.id]||"").trim()?"linear-gradient(90deg,#22c55e,#16a34a)":"#1e293b",
                border:"none",borderRadius:10,color:(values[field.id]||"").trim()?"#fff":"#475569",
                fontWeight:700,fontSize:14,cursor:(values[field.id]||"").trim()?"pointer":"default"
              }}>
                {step<activeScenario.fields.length-1?"Next Field →":"✅ Post Transaction"}
              </button>
            </div>
          </div>
        );
      }

      // Practice mode
      if(mode==="practice") return (
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <button onClick={()=>setMode("list")} style={bkBtn}>← Back</button>
          <div style={{background:"#1e293b",border:"1px solid #f59e0b44",borderRadius:16,padding:24,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
              <span style={{fontSize:28}}>{activeScenario.icon}</span>
              <div>
                <div style={{color:"#f1f5f9",fontWeight:700,fontSize:17}}>{activeScenario.title}</div>
                <div style={{color:"#64748b",fontSize:12}}>T-Code: {activeScenario.tcode} · Free Practice Mode</div>
              </div>
            </div>
            <div style={{background:"#0f172a",borderRadius:10,padding:14,color:"#94a3b8",fontSize:13,lineHeight:1.7}}>{activeScenario.description}</div>
          </div>

          {/* SAP Form */}
          <div style={{background:"#1a1f2e",border:"2px solid #f59e0b44",borderRadius:16,padding:24}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
              <div style={{background:"#f59e0b22",border:"1px solid #f59e0b44",borderRadius:8,padding:"4px 12px",color:"#f59e0b",fontSize:11,fontWeight:700}}>SAP {activeScenario.tcode}</div>
              <div style={{color:"#475569",fontSize:12}}>Fill all fields from memory</div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
              {activeScenario.fields.map(f=>{
                let borderColor="#334155";
                if(practiceSubmitted) borderColor=checked[f.id]?"#22c55e":"#ef4444";
                return (
                  <div key={f.id}>
                    <div style={{color:"#94a3b8",fontSize:12,marginBottom:5,fontWeight:600}}>{f.label}</div>
                    <input value={values[f.id]||""} onChange={e=>!practiceSubmitted&&setValues({...values,[f.id]:e.target.value})}
                      placeholder={f.placeholder}
                      style={{...iStyle2,border:`2px solid ${borderColor}`,background:practiceSubmitted?(checked[f.id]?"#052e16":"#2d0a0a"):"#0f172a"}}
                      readOnly={practiceSubmitted}/>
                    {practiceSubmitted&&(
                      <div style={{fontSize:11,marginTop:3,color:checked[f.id]?"#22c55e":"#f87171"}}>
                        {checked[f.id]?"✅ Correct!":"❌ Correct: "+f.correct}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {!practiceSubmitted?(
              <button onClick={submitPractice} style={{width:"100%",marginTop:20,padding:"13px 0",background:"linear-gradient(90deg,#f59e0b,#d97706)",border:"none",borderRadius:10,color:"#1e3a5f",fontWeight:800,fontSize:15,cursor:"pointer"}}>
                ✅ Submit Transaction
              </button>
            ):(
              <div>
                <div style={{background:"#0f172a",borderRadius:12,padding:20,marginTop:16,textAlign:"center"}}>
                  <div style={{fontSize:40,marginBottom:8}}>{score===activeScenario.fields.length?"🏆":score>activeScenario.fields.length/2?"👍":"📚"}</div>
                  <div style={{color:"#f1f5f9",fontWeight:800,fontSize:22}}>{score}/{activeScenario.fields.length} Correct</div>
                  <div style={{color:"#64748b",fontSize:13,marginTop:4}}>{score===activeScenario.fields.length?"Perfect! You know this transaction!":"Review the guided mode and try again!"}</div>
                </div>
                <div style={{background:"#0f172a",borderRadius:12,padding:16,marginTop:12}}>
                  <div style={{color:"#3b82f6",fontWeight:700,fontSize:13,marginBottom:6}}>📚 What SAP Did:</div>
                  <div style={{color:"#94a3b8",fontSize:13,lineHeight:1.8}}>{activeScenario.learning}</div>

                  <button onClick={()=>{setValues({});setChecked({});setPracticeSubmitted(false);setScore(0);}} style={{flex:1,padding:"11px 0",background:"#f59e0b22",border:"1px solid #f59e0b44",borderRadius:10,color:"#f59e0b",fontWeight:700,cursor:"pointer"}}>
                    🔄 Try Again
                  </button>
                  <button onClick={()=>setMode("list")} style={{flex:1,padding:"11px 0",background:"#334155",border:"none",borderRadius:10,color:"#94a3b8",fontWeight:700,cursor:"pointer"}}>
                    ← Back to List
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );

      // Scenarios list
      return (
        <div>
          <div style={{marginBottom:24}}>
            <h2 style={{color:"#f1f5f9",margin:"0 0 6px",fontSize:22}}>🖥️ Transaction Simulator</h2>
            <p style={{color:"#64748b",fontSize:14,margin:0}}>Practice real SAP transactions — guided first, then from memory!</p>
          </div>

          {/* Module tabs */}
          <div style={{display:"flex",background:"#1e293b",borderRadius:12,padding:4,marginBottom:20,gap:4,maxWidth:400}}>
            {[["AP","📙 Accounts Payable"],["AR","📕 Accounts Receivable"]].map(([m,l])=>(
              <button key={m} onClick={()=>setModule(m)} style={{flex:1,padding:"10px 0",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,background:module===m?(m==="AP"?"#f59e0b":"#ef4444"):"transparent",color:module===m?"#fff":"#64748b",transition:"all 0.2s"}}>{l}</button>
            ))}
          </div>

          {/* How it works */}
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:14,padding:16,marginBottom:20,display:"flex",gap:16,flexWrap:"wrap"}}>

          </div>

          {/* Scenario cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>

              <div key={sc.id} style={{background:"#1e293b",border:`1px solid ${module==="AP"?"#f59e0b44":"#ef444444"}`,borderRadius:16,padding:20}}>

                    📖 Guided
                  </button>

                    🎯 Practice
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── AI INTERVIEW SIMULATOR ───────────────────────────────────────────────
    const interviewQuestions = {
      Beginner: [
        { q:"What is SAP FICO and what are its two main components?", ideal:"SAP FICO stands for Financial Accounting (FI) and Controlling (CO). FI handles external financial reporting including balance sheet and P&L statements. CO handles internal management reporting including cost centers, profit centers and internal orders.", keywords:["financial accounting","controlling","FI","CO","balance sheet","P&L"] },
        { q:"What is a Company Code in SAP?", ideal:"A Company Code is the smallest organizational unit for which a complete set of accounts can be drawn up. It represents a legal entity and is used for external financial reporting. Each company code has its own chart of accounts, fiscal year variant and currency.", keywords:["legal entity","organizational unit","financial reporting","chart of accounts","fiscal year"] },
        { q:"What is the difference between a Chart of Accounts and a Company Code?", ideal:"A Chart of Accounts is a list of all GL accounts used by one or more company codes. Multiple company codes can share the same chart of accounts. The company code is the legal entity that uses those accounts for its financial reporting.", keywords:["chart of accounts","GL accounts","company code","legal entity","share"] },
        { q:"What is a Posting Key in SAP FI?", ideal:"A posting key is a two-digit numerical key that controls the entry of line items in SAP. It determines the account type, debit or credit posting, and which fields are required or optional during document entry. For example, posting key 40 is debit GL account and 50 is credit GL account.", keywords:["two-digit","debit","credit","account type","field selection","40","50"] },
        { q:"What is the document principle in SAP?", ideal:"The document principle means every business transaction in SAP creates a document that remains in the system permanently. Each document has a unique document number, contains header information like date and company code, and line items showing the accounts affected. Documents cannot be deleted, only reversed.", keywords:["document","permanent","unique number","header","line items","reversed","cannot be deleted"] },
        { q:"What is a Reconciliation Account?", ideal:"A reconciliation account is a GL account that is automatically updated when transactions are posted to a subledger account such as a vendor or customer. It links the accounts payable or accounts receivable subledger to the general ledger, ensuring they are always in balance.", keywords:["GL account","subledger","vendor","customer","automatically","balance","links"] },
      ],
      Intermediate: [
        { q:"Explain the Automatic Payment Program (F110) and its steps.", ideal:"F110 is used to automatically process outgoing payments to vendors. The steps are: 1) Enter parameters including company code, payment methods and payment date, 2) Run proposal to select open items, 3) Edit proposal to review and adjust, 4) Execute payment run to post clearing documents, 5) Print payment advices or generate bank file.", keywords:["F110","parameters","proposal","payment run","clearing","bank","automatic","vendor"] },
        { q:"What is the difference between parking and holding a document?", ideal:"A parked document is an incomplete document saved in SAP that updates reports and can be seen by others. It can be completed and posted later. A held document is saved locally only for the person who created it, does not update any reports, and is not visible to others.", keywords:["parked","held","incomplete","reports","visible","locally","FBV0","FB00"] },
        { q:"What is a Tolerance Group in SAP AP?", ideal:"A tolerance group defines the acceptable variance between a purchase order amount and the vendor invoice amount. If the invoice exceeds the tolerance limit, SAP automatically blocks it for payment. This is configured in MIRO for three-way match scenarios.", keywords:["variance","purchase order","invoice","blocked","tolerance limit","MIRO","acceptable"] },
        { q:"Explain the dunning process in SAP AR.", ideal:"Dunning is the process of sending payment reminders to customers with overdue invoices. The dunning program F150 has multiple levels, where level 1 is a gentle reminder and level 4 is a final legal notice. The process involves entering parameters, running a proposal, editing it, and printing or emailing dunning notices.", keywords:["F150","dunning levels","overdue","reminder","proposal","legal notice","customer","payment"] },
        { q:"What is GR/IR account and why is it important?", ideal:"GR/IR stands for Goods Receipt and Invoice Receipt. It is a balance sheet clearing account that acts as a bridge between the MM and FI modules. When goods are received, the GR/IR account is credited. When the invoice is posted, it is debited. If all goods are invoiced the account nets to zero.", keywords:["goods receipt","invoice receipt","clearing account","bridge","MM","FI","nets to zero","balance sheet"] },
        { q:"What are the steps in month-end closing in SAP FI?", ideal:"Month-end closing involves: posting all outstanding journal entries, running foreign currency revaluation, executing depreciation run using AFAB, clearing GR/IR accounts, posting accruals and prepayments, running financial statements to verify trial balance, and finally closing the posting period.", keywords:["journal entries","foreign currency","depreciation","AFAB","accruals","financial statements","trial balance","posting period"] },
      ],
      Advanced: [
        { q:"Explain the integration between SAP FI and MM modules.", ideal:"When a goods receipt is posted in MM using MIGO, SAP automatically creates an FI document debiting the inventory or GR/IR account and crediting the GR/IR clearing account. When MIRO is used to post the vendor invoice, it debits GR/IR clearing and credits the vendor account. This three-way match between PO, GR and invoice ensures accurate payables processing.", keywords:["MIGO","MIRO","goods receipt","three-way match","inventory","GR/IR","vendor","automatic","FI document"] },
        { q:"What is New GL and what are its advantages over Classic GL?", ideal:"New GL introduced in SAP ECC 5.0 provides document splitting, real-time integration with CO, parallel accounting for multiple ledgers like IFRS and local GAAP, segment reporting, and profit center accounting in real time. Classic GL required period-end reconciliation between FI and CO which New GL eliminates.", keywords:["document splitting","parallel ledgers","IFRS","segment reporting","profit center","real-time","reconciliation","ECC 5.0"] },
        { q:"Explain Asset Accounting year-end closing process.", ideal:"The year-end closing for Asset Accounting requires three steps in sequence. First run AFAB for the final depreciation posting in the last period. Second run AJAB to close the fiscal year in Asset Accounting, which prevents further postings. Third run AJRW to open the new fiscal year for asset transactions. This sequence is mandatory and cannot be reversed.", keywords:["AFAB","AJAB","AJRW","sequence","depreciation","close fiscal year","open new year","mandatory"] },
        { q:"What is document splitting in New GL and why is it used?", ideal:"Document splitting automatically splits line items in a document based on defined characteristics such as profit center or segment. This ensures that every line item in a document carries the same splitting characteristics, enabling complete financial statements at the segment or profit center level without manual allocation.", keywords:["document splitting","profit center","segment","line items","financial statements","automatic","allocation","characteristics"] },
        { q:"How does cost center settlement differ from internal order settlement?", ideal:"Cost center settlement allocates costs from one cost center to receivers using assessment or distribution cycles. Internal order settlement uses transaction KO88 to transfer all costs accumulated on the order to receivers such as cost centers, GL accounts or fixed assets based on a predefined settlement rule. Internal orders are typically settled at month end or project completion.", keywords:["KO88","settlement rule","assessment","distribution","cost center","internal order","receivers","GL accounts","assets"] },
        { q:"Explain parallel accounting in SAP and how it is configured.", ideal:"Parallel accounting allows a company to maintain multiple sets of accounts for different accounting standards such as IFRS and local GAAP simultaneously. In New GL this is achieved using parallel ledgers. Each ledger can have different depreciation methods, accrual policies and valuation approaches. Transactions can post to specific ledgers or all ledgers depending on configuration.", keywords:["parallel accounting","IFRS","local GAAP","parallel ledgers","New GL","depreciation","valuation","simultaneously"] },
      ],
    };

    function InterviewSim({isPremium}){
      const [screen,setScreen]=useState("menu"); // menu | setup | interview | feedback | results
      const [level,setLevel]=useState("Beginner");
      const [jobTitle,setJobTitle]=useState("SAP FICO Consultant");
      const [company,setCompany]=useState("Emirates NBD, Dubai");
      const [qIndex,setQIndex]=useState(0);
      const [answers,setAnswers]=useState([]);
      const [currentAnswer,setCurrentAnswer]=useState("");
      const [feedback,setFeedback]=useState(null);
      const [isLoading,setIsLoading]=useState(false);
      const [allResults,setAllResults]=useState([]);
      const [timer,setTimer]=useState(120);
      const [timerActive,setTimerActive]=useState(false);

      const levels=["Beginner","Intermediate","Advanced"];
      const levelColor={Beginner:"#22c55e",Intermediate:"#f59e0b",Advanced:"#ef4444"};
      const questions=interviewQuestions[level];
      const currentQ=questions[qIndex];

      // Timer
      React.useEffect(()=>{
        let interval;
        if(timerActive&&timer>0){
          interval=setInterval(()=>setTimer(t=>t-1),1000);
        }else if(timer===0){
          setTimerActive(false);
        }
        return ()=>clearInterval(interval);
      },[timerActive,timer]);

      function startInterview(){
        setScreen("interview");
        setQIndex(0);
        setAnswers([]);
        setCurrentAnswer("");
        setFeedback(null);
        setAllResults([]);
        setTimer(120);
        setTimerActive(true);
      }

      async function submitAnswer(){
        if(!currentAnswer.trim())return;
        setIsLoading(true);
        setTimerActive(false);

        const q=currentQ;
        const userAns=currentAnswer.trim();

        // Score based on keywords matched
        const matched=q.keywords.filter(k=>userAns.toLowerCase().includes(k.toLowerCase()));
        const keywordScore=Math.round((matched.length/q.keywords.length)*100);
        const lengthScore=Math.min(100,Math.round((userAns.split(" ").length/50)*100));
        const totalScore=Math.round(keywordScore*0.7+lengthScore*0.3);

        let grade,color,emoji;
        if(totalScore>=80){grade="Excellent";color="#22c55e";emoji="🏆";}
        else if(totalScore>=60){grade="Good";color="#3b82f6";emoji="👍";}
        else if(totalScore>=40){grade="Fair";color="#f59e0b";emoji="📚";}
        else{grade="Needs Work";color="#ef4444";emoji="💪";}

        // Get AI feedback via Claude API
        let aiFeedback="";
        try{
          const response=await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              model:"claude-sonnet-4-20250514",
              max_tokens:1000,
              messages:[{
                role:"user",
                content:`You are an SAP FICO interview coach for Gulf region jobs (UAE, KSA). 

Interview Question: "${q.q}"

Candidate's Answer: "${userAns}"

Ideal Answer should cover: "${q.ideal}"

Give feedback in exactly this format:
SCORE: ${totalScore}/100
GRADE: ${grade}

WHAT YOU GOT RIGHT:
[2-3 specific things they mentioned correctly, be encouraging]

WHAT WAS MISSING:
[2-3 key points from the ideal answer they missed]

IMPROVED ANSWER:
[Write a concise model answer in 3-4 sentences they can learn from]

INTERVIEW TIP:
[One practical tip for answering SAP questions in Gulf interviews]

Keep response concise and encouraging. Focus on SAP FICO knowledge.`
              }]
            })
          });
          const data=await response.json();
          aiFeedback=data.content?.[0]?.text||"";
        }catch(e){
          aiFeedback=`SCORE: ${totalScore}/100\nGRADE: ${grade}\n\nWHAT YOU GOT RIGHT:\n${matched.length>0?`You mentioned: ${matched.slice(0,3).join(", ")}`:"Keep practicing — review the module content."}\n\nWHAT WAS MISSING:\n${q.keywords.filter(k=>!userAns.toLowerCase().includes(k.toLowerCase())).slice(0,3).join(", ")}\n\nIMPROVED ANSWER:\n${q.ideal}\n\nINTERVIEW TIP:\nIn Gulf SAP interviews, always mention T-codes and relate your answer to real business scenarios.`;
        }

        const result={q:q.q,answer:userAns,score:totalScore,grade,color,emoji,feedback:aiFeedback,ideal:q.ideal};
        setFeedback(result);
        setAllResults(r=>[...r,result]);
        setIsLoading(false);
        setScreen("feedback");
      }

      function nextQuestion(){
        if(qIndex+1<questions.length){
          setQIndex(qIndex+1);
          setCurrentAnswer("");
          setFeedback(null);
          setTimer(120);
          setTimerActive(true);
          setScreen("interview");
        }else{
          setScreen("results");
        }
      }

      const formatTime=(s)=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;
      const avgScore=allResults.length?Math.round(allResults.reduce((s,r)=>s+r.score,0)/allResults.length):0;

      // Menu
      if(screen==="menu") return (
        <div>
          <div style={{marginBottom:24}}>
            <h2 style={{color:"#f1f5f9",margin:"0 0 6px",fontSize:22}}>🎤 AI Interview Simulator</h2>
            <p style={{color:"#64748b",fontSize:14,margin:0}}>Practice real SAP FICO interview questions with AI feedback — just like a real Gulf interview!</p>
          </div>

          {/* Setup card */}
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:28,maxWidth:600,marginBottom:20}}>
            <div style={{color:"#94a3b8",fontWeight:700,fontSize:12,letterSpacing:1,textTransform:"uppercase",marginBottom:16}}>⚙️ Interview Setup</div>

            <div style={{marginBottom:16}}>
              <div style={{color:"#64748b",fontSize:13,marginBottom:8}}>Job Title you're applying for:</div>
              <input value={jobTitle} onChange={e=>setJobTitle(e.target.value)} style={{...iStyle,marginBottom:0}} placeholder="e.g. SAP FICO Consultant"/>
            </div>

            <div style={{marginBottom:20}}>
              <div style={{color:"#64748b",fontSize:13,marginBottom:8}}>Company (for context):</div>
              <input value={company} onChange={e=>setCompany(e.target.value)} style={{...iStyle,marginBottom:0}} placeholder="e.g. Emaar Properties, Dubai"/>
            </div>

            <div style={{marginBottom:20}}>
              <div style={{color:"#64748b",fontSize:13,marginBottom:10}}>Select difficulty level:</div>
              <div style={{display:"flex",gap:8}}>
                {levels.map(l=>(
                  <button key={l} onClick={()=>setLevel(l)} style={{flex:1,padding:"10px 0",border:`2px solid ${level===l?levelColor[l]:"#334155"}`,borderRadius:10,background:level===l?levelColor[l]+"22":"transparent",color:level===l?levelColor[l]:"#64748b",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    {l==="Beginner"?"🟢":l==="Intermediate"?"🟡":"🔴"} {l}
                  </button>
                ))}
              </div>
            </div>

            <div style={{background:"#0f172a",borderRadius:10,padding:14,marginBottom:20}}>
              <div style={{color:"#94a3b8",fontSize:12,lineHeight:1.8}}>
                📋 <strong style={{color:"#f1f5f9"}}>{questions.length} questions</strong> · 2 minutes per question<br/>
                🤖 <strong style={{color:"#f1f5f9"}}>AI powered</strong> · Real-time feedback on every answer<br/>
                🎯 <strong style={{color:"#f1f5f9"}}>Scored</strong> · Get a final interview score and report
              </div>
            </div>

            <button onClick={startInterview} style={{width:"100%",padding:"14px 0",background:"linear-gradient(90deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer"}}>
              🎤 Start Interview
            </button>
          </div>

          {/* Tips */}
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:14,padding:20,maxWidth:600}}>
            <div style={{color:"#c9a84c",fontWeight:700,fontSize:13,marginBottom:12}}>💡 Gulf Interview Tips</div>
            {[
              ["Always mention T-codes","Gulf interviewers love when you say 'In FB60 I would...' — it proves real SAP knowledge"],
              ["Use STAR format","Situation → Task → Action → Result. Gives structured answers"],
              ["Relate to Gulf companies","Mention Emaar, ADNOC, Aramco scenarios — shows local market knowledge"],
              ["Know your numbers","Quote salaries, amounts, percentages — shows finance mindset"],
            ].map(([title,tip])=>(
              <div key={title} style={{display:"flex",gap:10,marginBottom:10}}>
                <div style={{color:"#c9a84c",fontSize:14,flexShrink:0}}>→</div>
                <div><strong style={{color:"#f1f5f9",fontSize:13}}>{title}:</strong> <span style={{color:"#64748b",fontSize:13}}>{tip}</span></div>
              </div>
            ))}
          </div>
        </div>
      );

      // Interview screen
      if(screen==="interview") return (
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <button onClick={()=>setScreen("menu")} style={bkBtn}>← Exit Interview</button>

          {/* Header */}
          <div style={{background:"linear-gradient(135deg,#1e3a5f,#1e1b4b)",border:"1px solid #334155",borderRadius:16,padding:20,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{color:"#f1f5f9",fontWeight:700,fontSize:15}}>🎤 {jobTitle}</div>
                <div style={{color:"#64748b",fontSize:13}}>🏢 {company}</div>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <Badge text={level} color={levelColor[level]}/>
                <div style={{background:timer<=30?"#ef444422":"#22c55e22",border:`1px solid ${timer<=30?"#ef4444":"#22c55e"}44`,borderRadius:8,padding:"6px 12px",color:timer<=30?"#ef4444":"#22c55e",fontWeight:800,fontSize:14}}>
                  ⏱ {formatTime(timer)}
                </div>
              </div>
            </div>
            <div style={{marginTop:12}}>
              <div style={{color:"#475569",fontSize:12,marginBottom:4}}>Question {qIndex+1} of {questions.length}</div>
              <PBar value={qIndex} max={questions.length} color={levelColor[level]}/>
            </div>
          </div>

          {/* Question */}
          <div style={{background:"#1e293b",border:`2px solid ${levelColor[level]}44`,borderRadius:16,padding:24,marginBottom:16}}>
            <div style={{color:levelColor[level],fontSize:12,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Question {qIndex+1}</div>
            <div style={{color:"#f1f5f9",fontSize:18,fontWeight:700,lineHeight:1.5}}>{currentQ.q}</div>
          </div>

          {/* Answer area */}
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:24}}>
            <div style={{color:"#94a3b8",fontSize:13,marginBottom:10}}>💬 Your Answer:</div>
            <textarea value={currentAnswer} onChange={e=>setCurrentAnswer(e.target.value)}
              placeholder="Type your answer here... Include T-codes, process steps, and examples from Gulf companies where possible."
              style={{width:"100%",minHeight:160,padding:"14px",background:"#0f172a",border:"1px solid #334155",borderRadius:10,color:"#f1f5f9",fontSize:14,resize:"vertical",outline:"none",fontFamily:"Arial,sans-serif",lineHeight:1.7,boxSizing:"border-box"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
              <div style={{color:"#475569",fontSize:12}}>{currentAnswer.split(" ").filter(w=>w).length} words</div>
              <div style={{color:"#475569",fontSize:12}}>Aim for 50+ words for best score</div>
            </div>
            <button onClick={submitAnswer} disabled={!currentAnswer.trim()||isLoading} style={{
              width:"100%",marginTop:16,padding:"13px 0",
              background:currentAnswer.trim()&&!isLoading?"linear-gradient(90deg,#6366f1,#8b5cf6)":"#1e293b",
              border:"none",borderRadius:10,color:currentAnswer.trim()&&!isLoading?"#fff":"#475569",
              fontWeight:800,fontSize:15,cursor:currentAnswer.trim()&&!isLoading?"pointer":"default"
            }}>
              {isLoading?"🤖 AI is evaluating your answer...":"Submit Answer →"}
            </button>
            {isLoading&&<div style={{textAlign:"center",marginTop:10,color:"#64748b",fontSize:13}}>⏳ Please wait — AI is reading your answer and preparing detailed feedback...</div>}
          </div>
        </div>
      );

      // Feedback screen
      if(screen==="feedback"&&feedback) return (
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{background:"#1e293b",border:`2px solid ${feedback.color}44`,borderRadius:16,padding:24,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
              <div style={{fontSize:44}}>{feedback.emoji}</div>
              <div>
                <div style={{color:feedback.color,fontWeight:800,fontSize:22}}>{feedback.score}/100 — {feedback.grade}</div>
                <div style={{color:"#64748b",fontSize:13,marginTop:2}}>Question {qIndex+1} of {questions.length}</div>
              </div>
            </div>
            <PBar value={feedback.score} max={100} color={feedback.color}/>
          </div>

          {/* AI Feedback */}
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:24,marginBottom:16}}>
            <div style={{color:"#c9a84c",fontWeight:700,fontSize:14,marginBottom:14}}>🤖 AI Interview Coach Feedback</div>
            <div style={{color:"#94a3b8",fontSize:13,lineHeight:2,whiteSpace:"pre-wrap"}}>{feedback.feedback}</div>
          </div>

          {/* Your answer */}
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:20,marginBottom:16}}>
            <div style={{color:"#64748b",fontWeight:700,fontSize:13,marginBottom:8}}>📝 Your Answer:</div>
            <div style={{color:"#94a3b8",fontSize:13,lineHeight:1.8,fontStyle:"italic"}}>"{feedback.answer}"</div>
          </div>

          <button onClick={nextQuestion} style={{width:"100%",padding:"14px 0",background:"linear-gradient(90deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer"}}>
            {qIndex+1<questions.length?`Next Question (${qIndex+2}/${questions.length}) →`:"See Final Results 🏆"}
          </button>
        </div>
      );

      // Results screen
      if(screen==="results") return (
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{background:"linear-gradient(135deg,#1e3a5f,#1e1b4b)",border:"1px solid #c9a84c44",borderRadius:20,padding:32,textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:56,marginBottom:10}}>{avgScore>=80?"🏆":avgScore>=60?"🎓":"📚"}</div>
            <h2 style={{color:"#f1f5f9",margin:"0 0 6px",fontSize:26}}>Interview Complete!</h2>
            <div style={{color:"#c9a84c",fontWeight:800,fontSize:36,margin:"10px 0"}}>{avgScore}/100</div>
            <div style={{color:"#64748b",fontSize:14}}>
              {avgScore>=80?"Outstanding! You're ready for Gulf SAP interviews! 🌟":
               avgScore>=60?"Good performance! Keep practicing to ace it! 💪":
               "Keep studying — you're building the right skills! 📚"}
            </div>
          </div>

          {/* Per question results */}
          <div style={{marginBottom:20}}>
            {allResults.map((r,i)=>(
              <div key={i} style={{background:"#1e293b",border:`1px solid ${r.color}33`,borderRadius:12,padding:"14px 18px",marginBottom:10,display:"flex",gap:14,alignItems:"center"}}>
                <div style={{fontSize:24}}>{r.emoji}</div>
                <div style={{flex:1}}>

    function GLConfigSim({isPremium}){
      const [mode,setMode]=useState("list");
      const [activeEx,setActiveEx]=useState(null);
      const [tab,setTab]=useState("theory");
      const [step,setStep]=useState(0);
      const [values,setValues]=useState({});
      const [practiceValues,setPracticeValues]=useState({});
      const [checked,setChecked]=useState({});
      const [practiceSubmitted,setPracticeSubmitted]=useState(false);
      const [score,setScore]=useState(0);
      const [completedEx,setCompletedEx]=useState([]);

      function startEx(ex){
        setActiveEx(ex);setTab("theory");setStep(0);
        setValues({});setPracticeValues({});
        setChecked({});setPracticeSubmitted(false);setScore(0);
        setMode("exercise");
      }

      function nextGuidedStep(){
        if(step<activeEx.fields.length-1) setStep(step+1);
        else{
          if(!completedEx.includes(activeEx.id)) setCompletedEx(c=>[...c,activeEx.id]);
          setTab("result");
        }
      }

      function submitPractice(){
        let sc=0; const ch={};
        activeEx.fields.forEach(f=>{
          const ok=(practiceValues[f.id]||"").trim().toLowerCase()===f.correct.toLowerCase();
          ch[f.id]=ok; if(ok) sc++;
        });
        setChecked(ch); setScore(sc); setPracticeSubmitted(true);
        if(!completedEx.includes(activeEx.id)&&sc===activeEx.fields.length) setCompletedEx(c=>[...c,activeEx.id]);
      }

      const iS={width:"100%",padding:"10px 14px",background:"#0f172a",border:"1px solid #334155",borderRadius:10,color:"#f1f5f9",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:4};

                  {done&&<div style={{position:"absolute",top:12,right:12,background:"#22c55e22",border:"1px solid #22c55e44",borderRadius:20,padding:"2px 8px",color:"#22c55e",fontSize:10,fontWeight:700}}>✅ Done</div>}

                  </div>
                </div>
              )}
            </div>

          {tab==="result"&&(
            <div style={{background:"#1e293b",border:"1px solid #22c55e44",borderRadius:14,padding:24}}>
              <div style={{textAlign:"center",marginBottom:20}}>
                <div style={{fontSize:48,marginBottom:8}}>🎉</div>
                <div style={{color:"#22c55e",fontWeight:800,fontSize:20,marginBottom:4}}>Configuration Complete!</div>
              </div>
              <div style={{background:"#052e16",border:"1px solid #22c55e33",borderRadius:12,padding:16,marginBottom:16}}>

      const [notification,setNotification]=useState("");
      const [history,setHistory]=useState([]);
      const [menuOpen,setMenuOpen]=useState(null);

      const sapScreens={
        "FB50":"gl_posting",
        "FB60":"vendor_invoice",
        "FB70":"customer_invoice",
        "FK01":"vendor_master",
        "FD01":"customer_master",
        "FS00":"gl_master",
        "F110":"payment_program",
        "FBL1N":"vendor_lineitems",
        "FBL5N":"customer_lineitems",
        "KS01":"cost_center",
        "AS01":"asset_master",
        "AFAB":"depreciation",
        "S_ALR_87012284":"fin_statements",
        "FB03":"display_doc",
      };

      const menuItems={
        "Favorites":["FB50 — GL Account Posting","FB60 — Vendor Invoice","FB70 — Customer Invoice","F110 — Payment Program"],
        "Financial Accounting":["FB50 — Enter GL Account Document","FB03 — Display Document","FB60 — Vendor Invoice","FB70 — Customer Invoice","FBL1N — Vendor Line Items","FBL5N — Customer Line Items"],
        "Controlling":["KS01 — Create Cost Center","KP06 — Cost Center Planning","KSB1 — Cost Center Line Items"],
        "Asset Accounting":["AS01 — Create Asset Master","AFAB — Post Depreciation","AW01N — Asset Explorer"],
        "Reports":["S_ALR_87012284 — Financial Statements","S_ALR_87013611 — Cost Center Report"],
      };

      function runTcode(tc){
        const clean=tc.trim().toUpperCase();
        if(!clean)return;
        setTcodeInput("");
        setTcode(clean);
        setPosted(false);
        setDocData({});
        setDocNumber("");
        setMenuOpen(null);
        if(sapScreens[clean]){
          setScreen(sapScreens[clean]);
          setHistory(h=>[clean,...h.slice(0,4)]);
          showNotif("");
        }else{
          showNotif(`Transaction ${clean} is not available in this simulator`);
        }
      }

      function showNotif(msg){setNotification(msg);if(msg)setTimeout(()=>setNotification(""),3000);}

      function generateDocNum(){return String(Math.floor(Math.random()*900000)+100000);}

      function postDocument(){
        const num=generateDocNum();
        setDocNumber(num);
        setPosted(true);
        showNotif(`Document ${num} posted successfully`);

        if (deferredPrompt) {

            <button onclick="document.getElementById('install-banner').remove()" style="background:none;border:none;color:#475569;cursor:pointer;font-size:18px;padding:4px;">✕</button>
          `;
          document.body.appendChild(banner);
        }
      }, 30000);
    });

    function installApp() {
      if (deferredPrompt) {

        deferredPrompt.userChoice.then(choice => {
          if (choice.outcome === 'accepted') {
