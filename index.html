    function GLConfigSim({isPremium}){
      const [step,setStep]=useState(0);
      const [saved,setSaved]=useState({});
      const [form,setForm]=useState({});
      const [msg,setMsg]=useState(null);
      const steps=[
        {tcode:"OX02",title:"Create Company Code",icon:"🏢",color:"#1a3c6e",fields:[
          {id:"compCode",label:"Company Code",placeholder:"e.g. AE01",hint:"4-character alphanumeric"},
          {id:"compName",label:"Company Name",placeholder:"e.g. Gulf Trading LLC"},
          {id:"city",label:"City",placeholder:"e.g. Dubai"},
          {id:"country",label:"Country Key",placeholder:"e.g. AE"},
          {id:"currency",label:"Currency",placeholder:"e.g. AED"},
          {id:"language",label:"Language",placeholder:"e.g. EN"},
        ]},
        {tcode:"OB13",title:"Create Chart of Accounts",icon:"📋",color:"#7c3aed",fields:[
          {id:"coaKey",label:"Chart of Accounts Key",placeholder:"e.g. GULF",hint:"4-character key"},
          {id:"coaDesc",label:"Description",placeholder:"e.g. Gulf Chart of Accounts"},
          {id:"maintLang",label:"Maintenance Language",placeholder:"e.g. EN"},
          {id:"acctLen",label:"GL Account Length",placeholder:"e.g. 6"},
        ]},
        {tcode:"OBY6",title:"Assign COA to Company Code",icon:"🔗",color:"#c9952a",fields:[
          {id:"assignCode",label:"Company Code",placeholder:saved["OX02"]?.compCode||"e.g. AE01",hint:"Use the code from OX02"},
          {id:"assignCOA",label:"Chart of Accounts",placeholder:saved["OB13"]?.coaKey||"e.g. GULF",hint:"Use the COA from OB13"},
        ]},
        {tcode:"FS00",title:"Create GL Account",icon:"📒",color:"#0a7c5c",fields:[
          {id:"glAcct",label:"GL Account Number",placeholder:"e.g. 100100"},
          {id:"coaRef",label:"Chart of Accounts",placeholder:saved["OB13"]?.coaKey||"e.g. GULF"},
          {id:"acctGroup",label:"Account Group",placeholder:"e.g. CASH"},
          {id:"shortDesc",label:"Short Description",placeholder:"e.g. Cash in Hand"},
          {id:"longDesc",label:"Long Description",placeholder:"e.g. Petty Cash Account Dubai Office"},
          {id:"acctType",label:"Account Type",placeholder:"e.g. Balance Sheet / P&L"},
        ]},
      ];
      const cur=steps[step];
      function handleSave(){
        const missing=cur.fields.filter(f=>!form[f.id]?.trim());
        if(missing.length){setMsg({type:"err",text:`Please fill in: ${missing.map(f=>f.label).join(", ")}`});return;}
        setSaved(s=>({...s,[cur.tcode]:form}));
        setMsg({type:"ok",text:`✅ ${cur.title} saved! Transaction ${cur.tcode} complete.`});
        setTimeout(()=>{if(step<steps.length-1){setStep(s=>s+1);setForm({});setMsg(null);}},1400);
      }
      const allDone=Object.keys(saved).length===steps.length;
      return (
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <div style={{marginBottom:20}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:"#1a2540",marginBottom:4}}>⚙️ GL Configuration Lab</div>
            <div style={{color:"#6b7fa8",fontSize:13}}>Follow 4 steps to set up a complete SAP GL configuration — just like a real consultant</div>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:24,flexWrap:"wrap"}}>
            {steps.map((s,i)=>(
              <button key={s.tcode} onClick={()=>{if(saved[s.tcode]||i===step){setStep(i);setForm(saved[s.tcode]||{});setMsg(null);}}} style={{flex:1,minWidth:120,padding:"10px 8px",borderRadius:8,border:`2px solid ${i===step?s.color:saved[s.tcode]?"#0a7c5c33":"#dce3f0"}`,background:saved[s.tcode]?"#e8f8f2":i===step?s.color+"12":"#f8faff",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:18}}>{saved[s.tcode]?"✅":s.icon}</div>
                <div style={{fontSize:10,fontWeight:700,color:i===step?s.color:saved[s.tcode]?"#0a7c5c":"#9aaac8",marginTop:2}}>{s.tcode}</div>
                <div style={{fontSize:10,color:"#6b7fa8"}}>{s.title.split(" ").slice(0,2).join(" ")}</div>
              </button>
            ))}
          </div>
          {allDone?(
            <div className="card" style={{textAlign:"center",padding:40}}>
              <div style={{fontSize:56,marginBottom:12}}>🎉</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#1a2540",marginBottom:8}}>GL Configuration Complete!</div>
              <p style={{color:"#6b7fa8",marginBottom:20,fontSize:14}}>You've configured: Company Code → Chart of Accounts → Assignment → GL Account</p>
              <button onClick={()=>{setStep(0);setSaved({});setForm({});setMsg(null);}} style={{padding:"10px 28px",background:"linear-gradient(135deg,#1a3c6e,#2a5298)",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>Start Over 🔄</button>
            </div>
          ):(
            <div className="card" style={{padding:28}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,paddingBottom:16,borderBottom:"1px solid #eef1f8"}}>
                <span style={{fontSize:32}}>{cur.icon}</span>
                <div>
                  <div style={{fontWeight:800,fontSize:16,color:"#1a2540"}}>{cur.title}</div>
                  <span style={{background:cur.color+"18",color:cur.color,border:`1px solid ${cur.color}33`,borderRadius:6,padding:"2px 10px",fontSize:11,fontWeight:700}}>Transaction: {cur.tcode}</span>
                </div>
                <div style={{marginLeft:"auto",fontSize:12,color:"#9aaac8"}}>Step {step+1} of {steps.length}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14,marginBottom:20}}>
                {cur.fields.map(f=>(
                  <div key={f.id}>
                    <label style={{display:"block",fontSize:12,fontWeight:700,color:"#3d5278",marginBottom:4}}>{f.label}{f.hint&&<span style={{color:"#9aaac8",fontWeight:400,fontSize:11}}> — {f.hint}</span>}</label>
                    <input value={form[f.id]||""} onChange={e=>setForm(p=>({...p,[f.id]:e.target.value}))} placeholder={f.placeholder} style={{width:"100%",padding:"9px 12px",border:"1.5px solid #dce3f0",borderRadius:7,fontSize:13,fontFamily:"inherit",color:"#1a2540"}}/>
                  </div>
                ))}
              </div>
              {msg&&<div style={{padding:"10px 14px",borderRadius:8,marginBottom:14,background:msg.type==="ok"?"#e8f8f2":"#fef2f2",border:`1px solid ${msg.type==="ok"?"#0a7c5c33":"#c0392b33"}`,color:msg.type==="ok"?"#0a7c5c":"#c0392b",fontSize:13,fontWeight:600}}>{msg.text}</div>}
              <button onClick={handleSave} style={{width:"100%",padding:"12px 0",background:`linear-gradient(135deg,${cur.color},${cur.color}cc)`,color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>💾 Save & Continue →</button>
            </div>
          )}
        </div>
      );
    }

  <!-- PWA Install Prompt -->
  <script>
    // Install prompt for Android
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show install banner after 30 seconds
      setTimeout(() => {
        if (deferredPrompt) {
          const banner = document.createElement('div');
          banner.id = 'install-banner';
          banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #c9a84c;border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:9999;box-shadow:0 8px 24px #000000aa;font-family:Arial,sans-serif;';
          banner.innerHTML = `
            <span style="font-size:24px">📱</span>
            <div>
              <div style="color:#f1f5f9;font-weight:700;font-size:13px">Install FICO Academy App</div>
              <div style="color:#64748b;font-size:11px">Add to your phone for quick access</div>
            </div>
            <button onclick="installApp()" style="background:linear-gradient(90deg,#c9a84c,#f0d080);border:none;border-radius:8px;padding:8px 16px;color:#0f172a;font-weight:700;font-size:12px;cursor:pointer;">Install</button>
            <button onclick="document.getElementById('install-banner').remove()" style="background:none;border:none;color:#475569;cursor:pointer;font-size:18px;padding:4px;">✕</button>
          `;
          document.body.appendChild(banner);
        }
      }, 30000);
    });

    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choice => {
          if (choice.outcome === 'accepted') {
            console.log('App installed!');
          }
          deferredPrompt = null;
          const banner = document.getElementById('install-banner');
          if (banner) banner.remove();
        });
      }
    }
  </script>
