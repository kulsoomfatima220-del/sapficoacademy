  <style>
    :root {
      --primary: #1a3c6e;
      --primary-light: #2a5298;
      --primary-dark: #0f2444;
      --accent: #c9952a;
      --accent-light: #f0b84a;
      --success: #0a7c5c;
      --danger: #c0392b;
      --warning: #d68910;
      --bg: #f4f6fb;
      --bg2: #eef1f8;
      --surface: #ffffff;
      --surface2: #f8faff;
      --border: #dce3f0;
      --border2: #c8d3e8;
      --text: #1a2540;
      --text2: #3d5278;
      --text3: #6b7fa8;
      --text4: #9aaac8;
      --shadow: 0 2px 12px rgba(26,60,110,0.08);
      --shadow2: 0 4px 24px rgba(26,60,110,0.12);
      --shadow3: 0 8px 40px rgba(26,60,110,0.16);
      --radius: 12px;
      --radius2: 8px;
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary-light) !important;
      box-shadow: 0 0 0 3px rgba(42,82,152,0.12) !important;
      outline: none;
    }

    /* LOADING SCREEN */
    #app-loader {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s;
    }
    #app-loader.done { opacity: 0; pointer-events: none; }
    .ld-icon { font-size: 56px; margin-bottom: 16px; animation: lpulse 1.8s ease-in-out infinite; }
    .ld-title { color: #fff; font-weight: 700; font-size: 24px; margin-bottom: 4px; font-family: 'Playfair Display', serif; letter-spacing: 0.5px; }
    .ld-sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 32px; letter-spacing: 1px; text-transform: uppercase; }
    .ld-bar { width: 240px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
    #lbar { height: 100%; background: linear-gradient(90deg, var(--accent-light), var(--accent)); border-radius: 4px; width: 5%; transition: width 0.35s ease; }
    #lmsg { color: rgba(255,255,255,0.5); font-size: 12px; }
    @keyframes lpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

    /* HAMBURGER */
    #ham-btn {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 1001;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius2); width: 42px; height: 42px;
      cursor: pointer; align-items: center; justify-content: center;
      flex-direction: column; gap: 5px; padding: 10px;
      box-shadow: var(--shadow);
    }
    #ham-btn span { display: block; width: 20px; height: 2px; background: var(--primary); border-radius: 2px; }

    /* OVERLAY */
    #mob-ov { display: none; position: fixed; inset: 0; background: rgba(26,60,110,0.4); z-index: 998; backdrop-filter: blur(2px); }
    #mob-ov.open { display: block; }

    /* TOP HEADER BAR */
    .top-header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(26,60,110,0.08);
    }
    .top-header-left { display: flex; align-items: center; gap: 16px; }
    .top-logo { display: flex; align-items: center; gap: 10px; }
    .top-logo-icon { font-size: 28px; }
    .top-logo-text { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--primary); }
    .top-logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
    .top-nav { display: flex; align-items: center; gap: 4px; margin-left: 32px; }
    .top-nav-item {

      cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--text2); transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
      border: none; background: transparent;
      white-space: nowrap;
    }
    .top-nav-item:hover { background: var(--bg2); color: var(--primary); }
    .top-nav-item.active {
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }
    .top-header-right { display: flex; align-items: center; gap: 10px; }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 30px;
      cursor: pointer;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 12px;
    }
    .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .user-role-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
    }
    .header-btn {
      padding: 7px 16px; border-radius: var(--radius2);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text2); transition: all 0.15s; font-family: inherit;
    }
    .header-btn:hover { background: var(--bg2); color: var(--primary); }
    .header-btn.green { background: #e8f8f2; border-color: #0a7c5c44; color: var(--success); }
    .header-btn.gold { background: linear-gradient(135deg, var(--accent), var(--accent-light)); border: none; color: #fff; font-weight: 700; }

    /* LAYOUT */
    .app-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
    .app-body { display: flex; flex: 1; }

    /* SIDEBAR */
    .sidebar {
      width: 220px; background: var(--primary-dark);
      display: flex; flex-direction: column;
      padding: 20px 0; flex-shrink: 0;
      position: sticky; top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
      transition: transform 0.25s ease;
    }
    .sidebar-section-label {
      padding: 12px 16px 4px;
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer; margin: 1px 8px;
      border-radius: var(--radius2); transition: all 0.15s;
      color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500;
      border: none; background: transparent; text-align: left;
      width: calc(100% - 16px);

    .nav-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
    .nav-item.active {

    .nav-item .nav-icon { font-size: 15px; flex-shrink: 0; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 16px; }
    .sidebar-footer { padding: 16px; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.08); }

    /* MAIN */
    .main-content { flex: 1; padding: 32px 32px; overflow-y: auto; max-height: calc(100vh - 64px); background: var(--bg); }

    /* CARDS */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .card-header {
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 15px; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .card-body { padding: 20px 24px; }

    /* STAT CARDS */
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--text); font-family: 'Playfair Display', serif; }
    .stat-sub { font-size: 12px; color: var(--text4); margin-top: 4px; }

    /* BUTTONS */
    .btn {
      padding: 10px 20px; border-radius: var(--radius2);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; font-family: inherit; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-light); box-shadow: 0 4px 12px rgba(26,60,110,0.25); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--accent-light); }
    .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
    .btn-outline:hover { background: var(--bg2); border-color: var(--primary); color: var(--primary); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-lg { padding: 13px 28px; font-size: 15px; }
    .btn-block { width: 100%; justify-content: center; }
    button:active { transform: scale(0.97); }

    /* MODULE CARDS */
    .module-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px; cursor: pointer;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .module-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow2);
      border-color: var(--border2);
    }
    .module-card .accent-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
    }
    .module-card .module-icon { font-size: 32px; margin-bottom: 12px; }
    .module-card h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .module-card p { font-size: 12px; color: var(--text3); line-height: 1.5; margin-bottom: 12px; }

    /* BADGES */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    }
    .badge-free { background: #e8f8f0; color: #0a7c5c; border: 1px solid #0a7c5c33; }
    .badge-premium { background: #fef6e8; color: #c9952a; border: 1px solid #c9952a33; }
    .badge-admin { background: #eef2ff; color: #4f46e5; border: 1px solid #4f46e533; }
    .badge-locked { background: #f5f5f5; color: #999; border: 1px solid #ddd; }

    /* PROGRESS */
    .progress-wrap { background: var(--bg2); border-radius: 10px; height: 8px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 10px; transition: width 0.5s ease; }

    /* FORM FIELDS */
    .field-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
    .field-input {
      width: 100%; padding: 10px 14px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius2); color: var(--text);
      font-size: 14px; font-family: inherit; transition: all 0.15s;
    }
    .field-input::placeholder { color: var(--text4); }

    /* PAGE HEADER */
    .page-header { margin-bottom: 28px; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .page-subtitle { font-size: 14px; color: var(--text3); }
    .page-divider { height: 2px; background: linear-gradient(90deg, var(--accent), transparent); margin: 16px 0 24px; width: 60px; border-radius: 2px; }

    /* TABLE */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { background: var(--primary-dark); color: rgba(255,255,255,0.85); padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px; letter-spacing: 0.3px; }
    .data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
    .data-table tr:hover td { background: var(--bg2); }
    .data-table tr:last-child td { border-bottom: none; }

    /* TABS */
    .tab-bar { display: flex; background: var(--bg2); border-radius: var(--radius2); padding: 4px; gap: 2px; }
    .tab-item { flex: 1; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; background: transparent; color: var(--text3); transition: all 0.15s; }
    .tab-item.active { background: var(--surface); color: var(--primary); font-weight: 700; box-shadow: var(--shadow); }

    /* ALERTS */
    .alert { padding: 12px 16px; border-radius: var(--radius2); font-size: 13px; margin-bottom: 16px; }
    .alert-success { background: #e8f8f2; border: 1px solid #0a7c5c33; color: #0a7c5c; }
    .alert-warning { background: #fef6e8; border: 1px solid #c9952a33; color: #c9952a; }
    .alert-info { background: #eef4ff; border: 1px solid #2a529833; color: var(--primary); }
    .alert-danger { background: #fef0ef; border: 1px solid #c0392b33; color: var(--danger); }

    /* LOCKED OVERLAY */
    .locked-overlay {
      background: var(--surface2); border: 2px dashed var(--border2);
      border-radius: var(--radius); padding: 48px 32px; text-align: center;
    }
    .locked-icon { font-size: 48px; margin-bottom: 12px; }
    .locked-title { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 8px; font-family: 'Playfair Display', serif; }
    .locked-desc { color: var(--text3); font-size: 14px; margin-bottom: 20px; }

    /* HERO BANNER */
    .hero-banner {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, #1a4a8a 100%);
      border-radius: var(--radius); padding: 32px 36px; color: #fff;
      position: relative; overflow: hidden; margin-bottom: 28px;
    }
    .hero-banner::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 220px; height: 220px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .hero-banner::after {
      content: ''; position: absolute; bottom: -60px; right: 60px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(201,149,42,0.08);
    }
    .hero-greeting { font-size: 13px; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; margin-bottom: 6px; }
    .hero-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .hero-sub { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
    .hero-stats { display: flex; gap: 24px; flex-wrap: wrap; }
    .hero-stat { }
    .hero-stat-val { font-size: 22px; font-weight: 700; font-family: 'Playfair Display', serif; }
    .hero-stat-label { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
    .hero-accent-line { width: 40px; height: 3px; background: var(--accent); border-radius: 2px; margin: 16px 0; }

    /* MOBILE */
    @media(max-width:900px) {
      .top-nav { display: none; }
      .main-content { padding: 20px 16px; }
    }
    @media(max-width:640px) {
      #ham-btn { display: flex; }
      .sidebar { position: fixed; top: 0; left: 0; z-index: 999; transform: translateX(-100%); width: 260px !important; height: 100vh; top: 0; }
      .sidebar.open { transform: translateX(0); box-shadow: 8px 0 32px rgba(0,0,0,0.3); }
      .main-content { padding: 72px 14px 24px !important; max-height: 100vh; }
      .top-header { padding: 0 16px; }
      .top-logo-text { font-size: 16px; }
      .hero-banner { padding: 24px 20px; }
      .hero-title { font-size: 22px; }
    }
  </style>
</head>

    <span></span><span></span><span></span>

  <div id="mob-ov" onclick="closeSidebar()"></div>

  <div id="root"></div>

  <script>
    function toggleSidebar(){
      var s=document.getElementById('main-sidebar');
      var o=document.getElementById('mob-ov');
      if(s)s.classList.toggle('open');
      if(o)o.classList.toggle('open');
    }
    function closeSidebar(){
      var s=document.getElementById('main-sidebar');
      var o=document.getElementById('mob-ov');
      if(s)s.classList.remove('open');
      if(o)o.classList.remove('open');
    }

    function setP(pct,msg){
      var b=document.getElementById('lbar');
      var m=document.getElementById('lmsg');
      if(b)b.style.width=pct+'%';
      if(m)m.textContent=msg;
    }
    function hideLd(){
      var l=document.getElementById('app-loader');
      if(l){l.classList.add('done');setTimeout(function(){if(l.parentNode)l.parentNode.removeChild(l);},600);}
    }
    function loadSc(src,cb){
      var s=document.createElement('script');s.src=src;
      s.onload=cb;
      s.onerror=function(){setP(100,'❌ Network error — check your internet connection.');};
      document.head.appendChild(s);
    }
    function startApp(){
      setP(72,'Compiling JSX…');
      var src=document.getElementById('jsx-src').textContent;
      setTimeout(function(){
        try{
          var js=Babel.transform(src,{presets:['react']}).code;
          setP(92,'Starting…');
          setTimeout(function(){
            try{(new Function(js))();setTimeout(hideLd,400);}
            catch(e){setP(100,'App error: '+e.message);console.error(e);}
          },30);
        }catch(e){setP(100,'Compile error: '+e.message);console.error(e);}
      },30);
    }

    setP(10,'Loading React…');
    loadSc('https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',function(){
      setP(32,'Loading ReactDOM…');
      loadSc('https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',function(){
        setP(55,'Loading compiler…');
        loadSc('https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js',function(){
          setP(70,'Compiler ready…');
          startApp();
        });
      });
    });
  </script>

    function Quiz({mod,onBack,onScore}){
      const [cur,setCur]=useState(0);
      const [sel,setSel]=useState(null);
      const [answers,setAnswers]=useState([]);
      const [done,setDone]=useState(false);
      function next(){
        if(sel===null)return;
        const na=[...answers,{q:cur,sel}];
        if(cur+1<mod.quiz.length){setAnswers(na);setCur(cur+1);setSel(null);}
        else{const sc=na.filter(a=>a.sel===mod.quiz[a.q].answer).length;setAnswers(na);setDone(true);onScore(mod.id,sc,mod.quiz.length);}
      }
      if(done){
        const sc=answers.filter(a=>a.sel===mod.quiz[a.q].answer).length;
        return (
          <div style={{maxWidth:600,margin:"0 auto"}}>
            <button onClick={onBack} style={bkBtn}>← Back</button>
            <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:36,textAlign:"center"}}>
              <div style={{fontSize:56,marginBottom:12}}>{sc===mod.quiz.length?"🏆":sc>1?"👍":"📚"}</div>
              <h2 style={{color:"#f1f5f9",fontSize:24}}>{sc}/{mod.quiz.length} Correct</h2>
              <p style={{color:"#64748b",marginBottom:20}}>{sc===mod.quiz.length?"Perfect! Well done.":"Review the lessons and try again!"}</p>
              {mod.quiz.map((q,i)=>(
                <div key={i} style={{background:"#0f172a",borderRadius:10,padding:14,marginTop:10,textAlign:"left"}}>
                  <div style={{color:"#94a3b8",fontSize:13,marginBottom:4}}>Q{i+1}: {q.q}</div>
                  <div style={{color:answers[i].sel===q.answer?"#22c55e":"#f87171",fontSize:13}}>
                    {answers[i].sel===q.answer?"✅ Correct":`❌ Wrong — Correct: ${q.options[q.answer]}`}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }
      const q=mod.quiz[cur];
      return (
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <button onClick={onBack} style={bkBtn}>← Back</button>
          <div style={{background:"#ffffff",border:"1px solid #dce3f0",borderRadius:12,padding:28,boxShadow:"0 2px 12px rgba(26,60,110,0.08)"}}>
            <div style={{color:"#64748b",fontSize:12,marginBottom:8}}>Question {cur+1} of {mod.quiz.length}</div>
            <PBar value={cur} max={mod.quiz.length} color="#3b82f6"/>
            <h3 style={{color:"#1a2540",fontSize:17,margin:"18px 0",fontFamily:"'Playfair Display',serif"}}>{q.q}</h3>
            {q.options.map((o,i)=>(
              <div key={i} onClick={()=>setSel(i)} style={{padding:"13px 16px",borderRadius:10,marginBottom:8,cursor:"pointer",border:`2px solid ${sel===i?"#1a3c6e":"#dce3f0"}`,background:sel===i?"#eef4ff":"#f8faff",color:sel===i?"#1a3c6e":"#3d5278",fontSize:14,transition:"all 0.15s"}}>
                {String.fromCharCode(65+i)}. {o}
              </div>
            ))}
            <button onClick={next} disabled={sel===null} style={{width:"100%",marginTop:8,padding:"12px 0",background:sel!==null?"linear-gradient(90deg,#3b82f6,#6366f1)":"#1e293b",border:"none",borderRadius:10,color:sel!==null?"#fff":"#475569",fontWeight:700,cursor:sel!==null?"pointer":"default"}}>
              {cur+1<mod.quiz.length?"Next Question →":"Finish Quiz"}
            </button>
          </div>
        </div>
      );
    }

      const ab=(c)=>({padding:"7px 14px",background:c+"22",color:c,border:`1px solid ${c}44`,borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12});
      const inp={width:"100%",padding:"9px 12px",background:"#f8faff",border:"1px solid #dce3f0",borderRadius:8,color:"#f1f5f9",fontSize:13,marginBottom:8,boxSizing:"border-box",outline:"none"};
      const sel={...inp,cursor:"pointer"};

      return (
        <div>
          <h2 style={{color:"#f1f5f9",margin:"0 0 6px"}}>⚙️ Admin Panel</h2>
          <p style={{color:"#6b7fa8",marginBottom:20,fontSize:14}}>Manage students · Track payments · Unlock certificates</p>
          {msg&&<div style={{background:"#e8f8f2",border:"1px solid #0a7c5c33",borderRadius:10,padding:"10px 16px",color:"#0a7c5c",fontSize:13,marginBottom:16}}>{msg}</div>}

          {/* Tabs */}
          <div style={{display:"flex",background:"#1e293b",borderRadius:12,padding:4,marginBottom:20,gap:4}}>
            {[["students","👥 Students"],["payments","💰 Payments"],["summary","📊 Summary"]].map(([t,l])=>(
              <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"9px 0",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12,background:tab===t?"#3b82f6":"transparent",color:tab===t?"#fff":"#64748b",transition:"all 0.2s"}}>{l}</button>
            ))}
          </div>

          {/* ── STUDENTS TAB ── */}
          {tab==="students"&&(
            <div>
              {users.length===0
                ?<div style={{color:"#475569",textAlign:"center",padding:48,background:"#1e293b",borderRadius:12}}>No registered users yet. Share your link to get started! 🚀</div>
                :users.map(u=>{
                  const tl=modules.reduce((s,m)=>s+m.lessons.length,0);
                  const dl=Object.keys(u.progress||{}).filter(k=>!k.startsWith("quiz_")).length;
                  const pct=Math.round(dl/tl*100);
                  return (
                    <div key={u.email} style={{background:"#ffffff",border:"1px solid #dce3f0",borderRadius:12,padding:"16px 18px",marginBottom:10,boxShadow:"0 1px 6px rgba(26,60,110,0.06)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                        <div>
                          <div style={{color:"#1a2540",fontWeight:700}}>{u.name}</div>
                          <div style={{color:"#6b7fa8",fontSize:13}}>{u.email}</div>
                          <div style={{color:"#9aaac8",fontSize:12,marginTop:4}}>Progress: {dl}/{tl} lessons ({pct}%)</div>
                          <div style={{marginTop:6}}><PBar value={dl} max={tl} color="#3b82f6"/></div>
                        </div>
                        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                          <Badge text={u.role==="premium"?"PREMIUM":"FREE"} color={u.role==="premium"?"#f59e0b":"#64748b"}/>
                          {u.certUnlocked&&<Badge text="CERT ✓" color="#22c55e"/>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
                        {u.role!=="premium"
                          ?<button onClick={()=>{update(u.email,{role:"premium"});setMsg(`✅ ${u.name} upgraded to Premium!`);}} style={ab("#f59e0b")}>⬆ Upgrade to Premium</button>
                          :<button onClick={()=>{update(u.email,{role:"free"});setMsg(`${u.name} downgraded.`);}} style={ab("#ef4444")}>⬇ Downgrade</button>
                        }
                        {!u.certUnlocked
                          ?<button onClick={()=>{update(u.email,{certUnlocked:true});setMsg(`🎓 Certificate unlocked for ${u.name}`);}} style={ab("#22c55e")}>🎓 Unlock Certificate</button>
                          :<button onClick={()=>update(u.email,{certUnlocked:false})} style={ab("#475569")}>🔒 Lock Certificate</button>
                        }
                        <button onClick={()=>{setNewP(p=>({...p,name:u.name,email:u.email}));setShowAddPayment(true);setTab("payments");}} style={ab("#3b82f6")}>💰 Record Payment</button>
                      </div>
                    </div>
                  );
                })
              }
            </div>
          )}

          {/* ── PAYMENTS TAB ── */}
          {tab==="payments"&&(
            <div>
              {/* Add Payment Button */}
              <button onClick={()=>setShowAddPayment(!showAddPayment)} style={{width:"100%",padding:"12px 0",background:"linear-gradient(90deg,#22c55e,#16a34a)",border:"none",borderRadius:12,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:16}}>
                {showAddPayment?"✕ Cancel":"➕ Record New Payment"}
              </button>

              {/* Add Payment Form */}
              {showAddPayment&&(
                <div style={{background:"#ffffff",border:"1px solid #dce3f0",borderRadius:12,padding:20,marginBottom:16,boxShadow:"0 1px 6px rgba(26,60,110,0.06)"}}>
                  <div style={{color:"#22c55e",fontWeight:700,fontSize:14,marginBottom:14}}>💰 New Payment</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <div>
                      <div style={{color:"#64748b",fontSize:11,marginBottom:4}}>Student Name *</div>
                      <input style={inp} placeholder="e.g. Ahmed Ali" value={newP.name} onChange={e=>setNewP({...newP,name:e.target.value})}/>
                    </div>
                    <div>
                      <div style={{color:"#64748b",fontSize:11,marginBottom:4}}>Email</div>
                      <input style={inp} placeholder="ahmed@gmail.com" value={newP.email} onChange={e=>setNewP({...newP,email:e.target.value})}/>
                    </div>
                    <div>
                      <div style={{color:"#64748b",fontSize:11,marginBottom:4}}>Amount (AED) *</div>
                      <input style={inp} type="number" value={newP.amount} onChange={e=>setNewP({...newP,amount:e.target.value})}/>
                    </div>
                    <div>
                      <div style={{color:"#64748b",fontSize:11,marginBottom:4}}>Payment Type</div>
                      <select style={sel} value={newP.type} onChange={e=>setNewP({...newP,type:e.target.value})}>
                        <option>Premium Bundle</option>
                        <option>Certificate</option>
                        <option>Single Module</option>
                        <option>Other</option>
                      </select>
                    </div>
                    <div>
                      <div style={{color:"#64748b",fontSize:11,marginBottom:4}}>Payment Method</div>
                      <select style={sel} value={newP.method} onChange={e=>setNewP({...newP,method:e.target.value})}>
                        <option>Bank Transfer</option>
                        <option>WhatsApp Pay</option>
                        <option>Wise</option>
                        <option>PayPal</option>
                        <option>Cash</option>
                        <option>Other</option>
                      </select>
                    </div>
                    <div>
                      <div style={{color:"#64748b",fontSize:11,marginBottom:4}}>Date</div>
                      <input style={inp} type="date" value={newP.date} onChange={e=>setNewP({...newP,date:e.target.value})}/>
                    </div>
                  </div>
                  <div>
                    <div style={{color:"#64748b",fontSize:11,marginBottom:4}}>Notes (optional)</div>
                    <input style={inp} placeholder="e.g. Paid via ADCB transfer" value={newP.notes} onChange={e=>setNewP({...newP,notes:e.target.value})}/>
                  </div>
                  <button onClick={addPayment} style={{width:"100%",padding:"11px 0",background:"linear-gradient(90deg,#22c55e,#16a34a)",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",marginTop:4}}>
                    ✅ Save Payment
                  </button>
                </div>
              )}

              {/* Payment List */}
              {payments.length===0?(
                <div style={{color:"#475569",textAlign:"center",padding:40,background:"#1e293b",borderRadius:12}}>
                  No payments recorded yet.<br/>
                  <span style={{fontSize:12}}>Click "Record New Payment" when a student pays you.</span>
                </div>
              ):(
                <div>
                  {/* Total bar */}
                  <div style={{background:"linear-gradient(135deg,#1e3a5f,#1e1b4b)",border:"1px solid #334155",borderRadius:12,padding:"14px 18px",marginBottom:14,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
                    <div style={{color:"#94a3b8",fontSize:13}}>Total Collected</div>
                    <div style={{color:"#22c55e",fontWeight:800,fontSize:20}}>AED {totalRevenue.toLocaleString()}</div>
                  </div>
                  {payments.slice().reverse().map(p=>(
                    <div key={p.id} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:"14px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                      <div>
                        <div style={{color:"#1a2540",fontWeight:700,fontSize:14}}>{p.name}</div>
                        {p.email&&<div style={{color:"#64748b",fontSize:12}}>{p.email}</div>}
                        <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                          <Badge text={p.type} color="#f59e0b"/>
                          <Badge text={p.method} color="#3b82f6"/>
                          <Badge text={p.date} color="#475569"/>
                        </div>
                        {p.notes&&<div style={{color:"#9aaac8",fontSize:12,marginTop:4}}>📝 {p.notes}</div>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{color:"#22c55e",fontWeight:800,fontSize:16}}>AED {parseFloat(p.amount).toLocaleString()}</div>
                        <button onClick={()=>deletePayment(p.id)} style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:6,padding:"4px 8px",color:"#ef4444",cursor:"pointer",fontSize:11,fontWeight:700}}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* ── SUMMARY TAB ── */}
          {tab==="summary"&&(
            <div>
              {/* Revenue Cards */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12,marginBottom:20}}>
                {[
                  {label:"Total Revenue",value:`AED ${totalRevenue.toLocaleString()}`,color:"#22c55e",icon:"💰"},
                  {label:"Total Students",value:users.length,color:"#3b82f6",icon:"👥"},
                  {label:"Premium Students",value:users.filter(u=>u.role==="premium").length,color:"#f59e0b",icon:"💎"},
                  {label:"Certificates",value:users.filter(u=>u.certUnlocked).length,color:"#c9a84c",icon:"🏅"},
                  {label:"Premium Sales",value:premiumCount,color:"#8b5cf6",icon:"📦"},
                  {label:"Cert Sales",value:certCount,color:"#06b6d4",icon:"📜"},
                ].map(s=>(
                  <div key={s.label} style={{background:"#1e293b",border:`1px solid ${s.color}33`,borderRadius:12,padding:"16px 14px",textAlign:"center"}}>
                    <div style={{fontSize:24,marginBottom:6}}>{s.icon}</div>
                    <div style={{color:s.color,fontWeight:800,fontSize:20,marginBottom:2}}>{s.value}</div>
                    <div style={{color:"#475569",fontSize:11}}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Revenue by month */}
              <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:14,padding:20,marginBottom:16}}>
                <div style={{color:"#94a3b8",fontWeight:700,fontSize:13,marginBottom:14}}>📅 Recent Payments</div>
                {payments.length===0?(
                  <div style={{color:"#475569",fontSize:13,textAlign:"center",padding:20}}>No payments yet</div>
                ):(
                  payments.slice(-5).reverse().map(p=>(
                    <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1e293b"}}>
                      <div>
                        <div style={{color:"#f1f5f9",fontSize:13,fontWeight:600}}>{p.name}</div>
                        <div style={{color:"#475569",fontSize:11}}>{p.date} · {p.type}</div>
                      </div>
                      <div style={{color:"#22c55e",fontWeight:700}}>AED {parseFloat(p.amount).toLocaleString()}</div>
                    </div>
                  ))
                )}
              </div>

              {/* Workflow reminder */}
              <div style={{background:"#f4f6fb",borderRadius:12,padding:18,border:"1px solid #dce3f0"}}>
                <div style={{color:"#1a3c6e",fontWeight:700,marginBottom:8}}>💡 Revenue Workflow</div>
                <div style={{color:"#6b7fa8",fontSize:13,lineHeight:2.2}}>
                  1. Student registers free → tries free modules<br/>
                  2. They WhatsApp you → pay AED 199<br/>
                  3. Go to <strong style={{color:"#f59e0b"}}>Students tab</strong> → Upgrade to Premium<br/>
                  4. Go to <strong style={{color:"#3b82f6"}}>Payments tab</strong> → Record the payment<br/>
                  5. They finish 80%+ → <strong style={{color:"#22c55e"}}>Unlock Certificate</strong> ✅
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── CASE STUDIES DATA ───────────────────────────────────────────────────
    const caseStudies = [
      {
        id:"cs1", tier:"free", icon:"🏢", color:"#22c55e", module:"GL",
        title:"Month-End Closing at Al Futtaim Group",
        company:"Al Futtaim Group, Dubai",
        difficulty:"Beginner",
        scenario:`Al Futtaim Group's finance team needs to perform their monthly GL closing for March 2024. The team has identified the following open items:\n\n• 3 unposted journal entries from the maintenance department\n• 1 accrual entry for electricity bill not yet received (AED 45,000)\n• Foreign currency revaluation needed for USD payables\n• Depreciation run not yet executed for the month`,
        steps:[
          {step:1, action:"Post outstanding journal entries", tcode:"FB50", detail:"Post the 3 pending maintenance entries. Use document type SA, ensure posting date is within March 2024."},
          {step:2, action:"Post accrual for electricity", tcode:"FB50", detail:"Debit Electricity Expense (P&L) AED 45,000 / Credit Accrued Liabilities (BS) AED 45,000. Use posting key 40/50."},
          {step:3, action:"Foreign currency revaluation", tcode:"FAGL_FC_VAL", detail:"Run foreign currency valuation for open USD items. System calculates gain/loss automatically."},
          {step:4, action:"Execute depreciation", tcode:"AFAB", detail:"Run depreciation for period 3, fiscal year 2024. Check log for errors before posting."},
          {step:5, action:"Balance confirmation", tcode:"S_ALR_87012284", detail:"Run financial statements to confirm trial balance is zero. All debit = credit."},
        ],
        questions:[
          {q:"An accrual entry was posted in March. In April, the actual invoice arrives for AED 47,000 (AED 2,000 more than accrual). What do you do?",options:["Reverse accrual and post invoice for AED 47,000","Post invoice for AED 47,000 only","Post invoice for AED 2,000 only","Do nothing"],answer:0,explanation:"Reverse the March accrual (FB08) then post the actual vendor invoice (FB60) for AED 47,000. The AED 2,000 difference hits P&L in April."},
          {q:"During foreign currency revaluation, SAP posts an unrealised loss of AED 8,200. Which accounts are affected?",options:["Bank account and Cash account","FX Loss (P&L) and FX Adjustment (BS)","Vendor account and Bank account","No accounts — it's just a report"],answer:1,explanation:"FX revaluation posts to an unrealised FX Loss/Gain account (P&L) and a Balance Sheet adjustment account. These reverse at the start of the next period."},
          {q:"The depreciation run shows an ERROR for Asset 100045. What is the most likely cause?",options:["Asset has no useful life set","Asset was acquired this month","Asset is fully depreciated","All of the above can cause errors"],answer:3,explanation:"All three can cause depreciation errors. Check Asset Explorer (AW01N) to review the asset status, useful life, and depreciation key before re-running."},

      },
      {
        id:"cs2", tier:"free", icon:"🛒", color:"#3b82f6", module:"AP",
        title:"Vendor Invoice Dispute at SABIC",
        company:"SABIC, Riyadh",
        difficulty:"Beginner",
        scenario:`SABIC received a vendor invoice from a logistics supplier:\n\n• PO Number: 4500012345\n• Invoice Amount: SAR 125,000\n• GR (Goods Receipt) Amount: SAR 118,000\n• Tolerance Limit configured: 5%\n\nThe invoice exceeds the GR by SAR 7,000 (5.9%). The AP team needs to decide how to handle this.`,
        steps:[
          {step:1, action:"Check PO and GR details", tcode:"ME23N / MB03", detail:"Review the Purchase Order and Goods Receipt to confirm quantities and amounts received."},
          {step:2, action:"Attempt invoice entry", tcode:"MIRO", detail:"Enter the invoice. SAP will flag a tolerance variance since 5.9% exceeds the 5% limit."},
          {step:3, action:"Block invoice", tcode:"MIRO", detail:"SAP automatically blocks the invoice for payment. The status shows 'R' (blocked)."},
          {step:4, action:"Contact vendor", tcode:"FBL1N", detail:"View vendor open items. Contact vendor to issue a credit memo for the disputed SAR 7,000."},
          {step:5, action:"Post credit memo or release", tcode:"FB65 / MRBR", detail:"Either post vendor credit memo (FB65) to reduce balance, or release the block (MRBR) if approved by management."},

        questions:[
          {q:"The vendor insists the SAR 7,000 is correct for additional freight charges not on the PO. What is the correct SAP action?",options:["Force post the invoice and override the block","Create a new PO line item for freight and do GR","Delete the invoice and re-enter","Change the tolerance limit to 10%"],answer:1,explanation:"Create a new PO line for the additional freight (ME22N), do a GR (MIGO), then post the invoice via MIRO. This maintains the 3-way match integrity."},
          {q:"How do you view all blocked vendor invoices in SAP?",options:["FBL1N","MRBR","FB60","F110"],answer:1,explanation:"MRBR (Release Blocked Invoices) shows all invoices blocked due to price/quantity variance. You can review and selectively release them."},
          {q:"The F110 payment run is scheduled for tomorrow. The disputed invoice is still blocked. What happens?",options:["F110 pays it anyway","F110 skips all blocked invoices automatically","F110 fails completely","You must manually include it"],answer:1,explanation:"F110 automatically skips invoices with a payment block. Only released, due invoices are included in the payment proposal."},

      {

          {step:2, action:"Create Internal Order for the tower project", tcode:"KO01", detail:"Create Investment Order IO-8854 'Downtown Tower 2024'. Set settlement rule to capitalize costs to Asset Under Construction."},
          {step:3, action:"Enter budget plan", tcode:"KP06", detail:"Enter planned costs per cost center per month. AED 850M distributed across 36 months per work breakdown."},
          {step:4, action:"Review Month 3 variance", tcode:"S_ALR_87013611", detail:"Run Cost Center Actual/Plan/Variance report. Civil CC-1001 shows AED 12M actual vs AED 10.7M planned = AED 1.3M overspend (12%)."},

        ]
      },
      {

    const interviewQuestions = {
      Beginner: [
        { q:"What is SAP FICO and what are its two main components?", ideal:"SAP FICO stands for Financial Accounting (FI) and Controlling (CO). FI handles external financial reporting including balance sheet and P&L statements. CO handles internal management reporting including cost centers, profit centers and internal orders.", keywords:["financial accounting","controlling","FI","CO","balance sheet","P&L"] },
        { q:"What is a Company Code in SAP?", ideal:"A Company Code is the smallest organizational unit for which a complete set of accounts can be drawn up. It represents a legal entity and is used for external financial reporting. Each company code has its own chart of accounts, fiscal year variant and currency.", keywords:["legal entity","organizational unit","financial reporting","chart of accounts","fiscal year"] },
        { q:"What is the difference between a Chart of Accounts and a Company Code?", ideal:"A Chart of Accounts is a list of all GL accounts used by one or more company codes. Multiple company codes can share the same chart of accounts. The company code is the legal entity that uses those accounts for its financial reporting.", keywords:["chart of accounts","GL accounts","company code","legal entity","share"] },
        { q:"What is a Posting Key in SAP FI?", ideal:"A posting key is a two-digit numerical key that controls the entry of line items in SAP. It determines the account type, debit or credit posting, and which fields are required or optional during document entry. For example, posting key 40 is debit GL account and 50 is credit GL account.", keywords:["two-digit","debit","credit","account type","field selection","40","50"] },
        { q:"What is the document principle in SAP?", ideal:"The document principle means every business transaction in SAP creates a document that remains in the system permanently. Each document has a unique document number, contains header information like date and company code, and line items showing the accounts affected. Documents cannot be deleted, only reversed.", keywords:["document","permanent","unique number","header","line items","reversed","cannot be deleted"] },
        { q:"What is a Reconciliation Account?", ideal:"A reconciliation account is a GL account that is automatically updated when transactions are posted to a subledger account such as a vendor or customer. It links the accounts payable or accounts receivable subledger to the general ledger, ensuring they are always in balance.", keywords:["GL account","subledger","vendor","customer","automatically","balance","links"] },
      ],
      Intermediate: [
        { q:"Explain the Automatic Payment Program (F110) and its steps.", ideal:"F110 is used to automatically process outgoing payments to vendors. The steps are: 1) Enter parameters including company code, payment methods and payment date, 2) Run proposal to select open items, 3) Edit proposal to review and adjust, 4) Execute payment run to post clearing documents, 5) Print payment advices or generate bank file.", keywords:["F110","parameters","proposal","payment run","clearing","bank","automatic","vendor"] },
        { q:"What is the difference between parking and holding a document?", ideal:"A parked document is an incomplete document saved in SAP that updates reports and can be seen by others. It can be completed and posted later. A held document is saved locally only for the person who created it, does not update any reports, and is not visible to others.", keywords:["parked","held","incomplete","reports","visible","locally","FBV0","FB00"] },
        { q:"What is a Tolerance Group in SAP AP?", ideal:"A tolerance group defines the acceptable variance between a purchase order amount and the vendor invoice amount. If the invoice exceeds the tolerance limit, SAP automatically blocks it for payment. This is configured in MIRO for three-way match scenarios.", keywords:["variance","purchase order","invoice","blocked","tolerance limit","MIRO","acceptable"] },
        { q:"Explain the dunning process in SAP AR.", ideal:"Dunning is the process of sending payment reminders to customers with overdue invoices. The dunning program F150 has multiple levels, where level 1 is a gentle reminder and level 4 is a final legal notice. The process involves entering parameters, running a proposal, editing it, and printing or emailing dunning notices.", keywords:["F150","dunning levels","overdue","reminder","proposal","legal notice","customer","payment"] },
        { q:"What is GR/IR account and why is it important?", ideal:"GR/IR stands for Goods Receipt and Invoice Receipt. It is a balance sheet clearing account that acts as a bridge between the MM and FI modules. When goods are received, the GR/IR account is credited. When the invoice is posted, it is debited. If all goods are invoiced the account nets to zero.", keywords:["goods receipt","invoice receipt","clearing account","bridge","MM","FI","nets to zero","balance sheet"] },
        { q:"What are the steps in month-end closing in SAP FI?", ideal:"Month-end closing involves: posting all outstanding journal entries, running foreign currency revaluation, executing depreciation run using AFAB, clearing GR/IR accounts, posting accruals and prepayments, running financial statements to verify trial balance, and finally closing the posting period.", keywords:["journal entries","foreign currency","depreciation","AFAB","accruals","financial statements","trial balance","posting period"] },

        { q:"What is New GL and what are its advantages over Classic GL?", ideal:"New GL introduced in SAP ECC 5.0 provides document splitting, real-time integration with CO, parallel accounting for multiple ledgers like IFRS and local GAAP, segment reporting, and profit center accounting in real time. Classic GL required period-end reconciliation between FI and CO which New GL eliminates.", keywords:["document splitting","parallel ledgers","IFRS","segment reporting","profit center","real-time","reconciliation","ECC 5.0"] },
        { q:"Explain Asset Accounting year-end closing process.", ideal:"The year-end closing for Asset Accounting requires three steps in sequence. First run AFAB for the final depreciation posting in the last period. Second run AJAB to close the fiscal year in Asset Accounting, which prevents further postings. Third run AJRW to open the new fiscal year for asset transactions. This sequence is mandatory and cannot be reversed.", keywords:["AFAB","AJAB","AJRW","sequence","depreciation","close fiscal year","open new year","mandatory"] },
        { q:"What is document splitting in New GL and why is it used?", ideal:"Document splitting automatically splits line items in a document based on defined characteristics such as profit center or segment. This ensures that every line item in a document carries the same splitting characteristics, enabling complete financial statements at the segment or profit center level without manual allocation.", keywords:["document splitting","profit center","segment","line items","financial statements","automatic","allocation","characteristics"] },
        { q:"How does cost center settlement differ from internal order settlement?", ideal:"Cost center settlement allocates costs from one cost center to receivers using assessment or distribution cycles. Internal order settlement uses transaction KO88 to transfer all costs accumulated on the order to receivers such as cost centers, GL accounts or fixed assets based on a predefined settlement rule. Internal orders are typically settled at month end or project completion.", keywords:["KO88","settlement rule","assessment","distribution","cost center","internal order","receivers","GL accounts","assets"] },
        { q:"Explain parallel accounting in SAP and how it is configured.", ideal:"Parallel accounting allows a company to maintain multiple sets of accounts for different accounting standards such as IFRS and local GAAP simultaneously. In New GL this is achieved using parallel ledgers. Each ledger can have different depreciation methods, accrual policies and valuation approaches. Transactions can post to specific ledgers or all ledgers depending on configuration.", keywords:["parallel accounting","IFRS","local GAAP","parallel ledgers","New GL","depreciation","valuation","simultaneously"] },

              {!isPremium&&(

                    <PBar value={d} max={mod.lessons.length} color={locked?"#dce3f0":mod.color}/>

                      <span>{d}/{mod.lessons.length} lessons</span>
                      {qs&&<span style={{color:"#c9952a",fontWeight:600}}>Quiz: {qs.score}/{qs.total}</span>}

        );

        mainContent=<SAPGuiSim/>;

      }else if(view==="glconfig"){

      }else if(view==="interview"){
        mainContent=<InterviewSim isPremium={isPremium}/>;
      }else if(view==="simulator"){

        mainContent=<CaseStudiesList isPremium={isPremium} onSelect={setActiveCase}/>;

      const navGo = (id) => { setView(id);setActiveMod(null);setActiveLesson(null);setQuizMod(null);setActiveCase(null);if(window.innerWidth<=640)closeSidebar(); };
      const roleColor = user.role==="admin"?"#4f46e5":user.role==="premium"?"#c9952a":"#0a7c5c";
      const roleLabel = user.role==="admin"?"ADMIN":user.role==="premium"?"PREMIUM":"FREE";

      return (
        <div className="app-wrapper" dir={t.dir} style={{fontFamily:isRTL?"'Noto Sans Arabic','Segoe UI',sans-serif":undefined}}>

          {/* TOP HEADER */}
          <header className="top-header">
            <div className="top-header-left">
              <div className="top-logo">
                <span className="top-logo-icon">🎓</span>
                <div>
                  <div className="top-logo-text">FICO Academy Gulf</div>
                  <div className="top-logo-sub">SAP FICO Professional Training</div>
                </div>
              </div>
              <nav className="top-nav">
                {navItems.slice(0,5).map(n=>(
                  <button key={n.id} onClick={()=>navGo(n.id)} className={`top-nav-item${isActive(n.id)?" active":""}`}>
                    <span>{n.icon}</span>{n.label}

              </nav>
            </div>
            <div className="top-header-right">
              {/* Language Switcher */}
              <div style={{display:"flex",alignItems:"center",gap:3,background:"#f4f6fb",border:"1px solid #dce3f0",borderRadius:8,padding:3}}>
                {[["en","EN"],["ar","عر"],["fa","فا"]].map(([l,label])=>(
                  <button key={l} onClick={()=>{setLang(l);saveLang(l);}} style={{padding:"4px 8px",border:"none",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11,background:lang===l?"#1a3c6e":"transparent",color:lang===l?"#fff":"#6b7fa8",fontFamily:"inherit",transition:"all 0.15s"}}>{label}</button>
                ))}
              </div>
              <button className="header-btn green" onClick={()=>setShowCert(true)}>🏅 {t.myCertificate}</button>
              <a href="https://wa.me/971522903634?text=Hi%20Kulsoom!" target="_blank" className="header-btn" style={{textDecoration:"none",color:"#0a7c5c",background:"#e8f8f2",border:"1px solid #0a7c5c33"}}>💬 WhatsApp</a>
              <div className="user-chip" onClick={logout} title="Click to sign out">
                <div className="user-avatar">{user.name[0].toUpperCase()}</div>
                <div>
                  <div className="user-name">{user.name.split(" ")[0]}</div>
                </div>
                <span className="badge" style={{background:roleColor+"18",color:roleColor,border:`1px solid ${roleColor}33`,fontSize:9,padding:"2px 6px"}}>{roleLabel}</span>
              </div>
            </div>
          </header>

          {/* BODY */}
          <div className="app-body">
            {/* SIDEBAR */}
            <aside className="sidebar" id="main-sidebar">
              <div style={{padding:"8px 12px 4px"}}>
                <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:1.5,padding:"8px 4px 4px"}}>Main Menu</div>
              </div>
              {navItems.map(n=>(
                <button key={n.id} onClick={()=>navGo(n.id)} className={`nav-item${isActive(n.id)?" active":""}`}>
                  <span className="nav-icon">{n.icon}</span>
                  <span className="sidebar-label">{n.label}</span>
                </button>
              ))}

              <div className="sidebar-divider"/>
              <div style={{padding:"4px 12px",fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:1.5}}>Community</div>
              <a href="https://chat.whatsapp.com/CjholVUQisY6J5mBq2QbWO" target="_blank" className="nav-item" style={{textDecoration:"none",color:"rgba(255,255,255,0.6)"}}>
                <span className="nav-icon">👥</span><span className="sidebar-label">Join Community</span>
              </a>
              <a href="https://wa.me/971522903634?text=Hi%20Kulsoom!" target="_blank" className="nav-item" style={{textDecoration:"none",color:"rgba(255,255,255,0.6)"}}>
                <span className="nav-icon">💬</span><span className="sidebar-label">WhatsApp Us</span>
              </a>

              <div style={{flex:1}}/>
              <div className="sidebar-divider"/>
              <div style={{padding:"12px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#c9952a,#f0b84a)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:14}}>{user.name[0].toUpperCase()}</div>
                  <div>
                    <div style={{color:"#fff",fontSize:13,fontWeight:600}}>{user.name.split(" ")[0]}</div>
                    <span style={{background:roleColor+"33",color:roleColor,border:`1px solid ${roleColor}55`,borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700}}>{roleLabel}</span>

            {/* MAIN CONTENT */}
            <main className="main-content">
              {mainContent}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>


  <!-- PWA Install Prompt -->
  <script>
    // Install prompt for Android
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show install banner after 30 seconds
      setTimeout(() => {
        if (deferredPrompt) {
          const banner = document.createElement('div');
          banner.id = 'install-banner';
          banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #c9a84c;border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:9999;box-shadow:0 8px 24px #000000aa;font-family:Arial,sans-serif;';
          banner.innerHTML = `
            <span style="font-size:24px">📱</span>
            <div>
              <div style="color:#f1f5f9;font-weight:700;font-size:13px">Install FICO Academy App</div>
              <div style="color:#64748b;font-size:11px">Add to your phone for quick access</div>
            </div>
            <button onclick="installApp()" style="background:linear-gradient(90deg,#c9a84c,#f0d080);border:none;border-radius:8px;padding:8px 16px;color:#0f172a;font-weight:700;font-size:12px;cursor:pointer;">Install</button>
            <button onclick="document.getElementById('install-banner').remove()" style="background:none;border:none;color:#475569;cursor:pointer;font-size:18px;padding:4px;">✕</button>
          `;
          document.body.appendChild(banner);
        }
      }, 30000);
    });

    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choice => {
          if (choice.outcome === 'accepted') {
            console.log('App installed!');
          }
          deferredPrompt = null;
          const banner = document.getElementById('install-banner');
          if (banner) banner.remove();
        });
      }
    }
  </script>
