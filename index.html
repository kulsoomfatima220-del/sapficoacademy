  <style>
    :root {
      --primary: #1a3c6e;
      --primary-light: #2a5298;
      --primary-dark: #0f2444;
      --accent: #c9952a;
      --accent-light: #f0b84a;
      --success: #0a7c5c;
      --danger: #c0392b;
      --warning: #d68910;
      --bg: #f4f6fb;
      --bg2: #eef1f8;
      --surface: #ffffff;
      --surface2: #f8faff;
      --border: #dce3f0;
      --border2: #c8d3e8;
      --text: #1a2540;
      --text2: #3d5278;
      --text3: #6b7fa8;
      --text4: #9aaac8;
      --shadow: 0 2px 12px rgba(26,60,110,0.08);
      --shadow2: 0 4px 24px rgba(26,60,110,0.12);
      --shadow3: 0 8px 40px rgba(26,60,110,0.16);
      --radius: 12px;
      --radius2: 8px;
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary-light) !important;
      box-shadow: 0 0 0 3px rgba(42,82,152,0.12) !important;
      outline: none;
    }

    /* LOADING SCREEN */
    #app-loader {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s;
    }
    #app-loader.done { opacity: 0; pointer-events: none; }
    .ld-icon { font-size: 56px; margin-bottom: 16px; animation: lpulse 1.8s ease-in-out infinite; }
    .ld-title { color: #fff; font-weight: 700; font-size: 24px; margin-bottom: 4px; font-family: 'Playfair Display', serif; letter-spacing: 0.5px; }
    .ld-sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 32px; letter-spacing: 1px; text-transform: uppercase; }
    .ld-bar { width: 240px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
    #lbar { height: 100%; background: linear-gradient(90deg, var(--accent-light), var(--accent)); border-radius: 4px; width: 5%; transition: width 0.35s ease; }
    #lmsg { color: rgba(255,255,255,0.5); font-size: 12px; }
    @keyframes lpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

    /* HAMBURGER */
    #ham-btn {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 1001;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius2); width: 42px; height: 42px;
      cursor: pointer; align-items: center; justify-content: center;
      flex-direction: column; gap: 5px; padding: 10px;
      box-shadow: var(--shadow);
    }
    #ham-btn span { display: block; width: 20px; height: 2px; background: var(--primary); border-radius: 2px; }

    /* OVERLAY */
    #mob-ov { display: none; position: fixed; inset: 0; background: rgba(26,60,110,0.4); z-index: 998; backdrop-filter: blur(2px); }
    #mob-ov.open { display: block; }

    /* TOP HEADER BAR */
    .top-header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(26,60,110,0.08);
    }
    .top-header-left { display: flex; align-items: center; gap: 16px; }
    .top-logo { display: flex; align-items: center; gap: 10px; }
    .top-logo-icon { font-size: 28px; }
    .top-logo-text { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--primary); }
    .top-logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
    .top-nav { display: flex; align-items: center; gap: 4px; margin-left: 32px; }
    .top-nav-item {
      padding: 8px 14px; border-radius: var(--radius2);
      cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--text2); transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
      border: none; background: transparent;
      white-space: nowrap;
    }
    .top-nav-item:hover { background: var(--bg2); color: var(--primary); }
    .top-nav-item.active {
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }
    .top-header-right { display: flex; align-items: center; gap: 10px; }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 30px;
      cursor: pointer;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 12px;
    }
    .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .user-role-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
    }
    .header-btn {
      padding: 7px 16px; border-radius: var(--radius2);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text2); transition: all 0.15s; font-family: inherit;
    }
    .header-btn:hover { background: var(--bg2); color: var(--primary); }
    .header-btn.green { background: #e8f8f2; border-color: #0a7c5c44; color: var(--success); }
    .header-btn.gold { background: linear-gradient(135deg, var(--accent), var(--accent-light)); border: none; color: #fff; font-weight: 700; }

    /* LAYOUT */
    .app-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
    .app-body { display: flex; flex: 1; }

    /* SIDEBAR */
    .sidebar {
      width: 220px; background: var(--primary-dark);
      display: flex; flex-direction: column;
      padding: 20px 0; flex-shrink: 0;
      position: sticky; top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
      transition: transform 0.25s ease;
    }
    .sidebar-section-label {
      padding: 12px 16px 4px;
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer; margin: 1px 8px;
      border-radius: var(--radius2); transition: all 0.15s;
      color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500;
      border: none; background: transparent; text-align: left;
      width: calc(100% - 16px);
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
    .nav-item.active {
      background: var(--accent);
      color: #fff; font-weight: 600;
      box-shadow: 0 2px 8px rgba(201,149,42,0.4);
    }
    .nav-item .nav-icon { font-size: 15px; flex-shrink: 0; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 16px; }
    .sidebar-footer { padding: 16px; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.08); }

    /* MAIN */
    .main-content { flex: 1; padding: 32px 32px; overflow-y: auto; max-height: calc(100vh - 64px); background: var(--bg); }

    /* CARDS */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .card-header {
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 15px; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .card-body { padding: 20px 24px; }

    /* STAT CARDS */
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--text); font-family: 'Playfair Display', serif; }
    .stat-sub { font-size: 12px; color: var(--text4); margin-top: 4px; }

    /* BUTTONS */
    .btn {
      padding: 10px 20px; border-radius: var(--radius2);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; font-family: inherit; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-light); box-shadow: 0 4px 12px rgba(26,60,110,0.25); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--accent-light); }
    .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
    .btn-outline:hover { background: var(--bg2); border-color: var(--primary); color: var(--primary); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-lg { padding: 13px 28px; font-size: 15px; }
    .btn-block { width: 100%; justify-content: center; }
    button:active { transform: scale(0.97); }

    /* MODULE CARDS */
    .module-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px; cursor: pointer;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .module-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow2);
      border-color: var(--border2);
    }
    .module-card .accent-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
    }
    .module-card .module-icon { font-size: 32px; margin-bottom: 12px; }
    .module-card h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .module-card p { font-size: 12px; color: var(--text3); line-height: 1.5; margin-bottom: 12px; }

    /* BADGES */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    }
    .badge-free { background: #e8f8f0; color: #0a7c5c; border: 1px solid #0a7c5c33; }
    .badge-premium { background: #fef6e8; color: #c9952a; border: 1px solid #c9952a33; }
    .badge-admin { background: #eef2ff; color: #4f46e5; border: 1px solid #4f46e533; }
    .badge-locked { background: #f5f5f5; color: #999; border: 1px solid #ddd; }

    /* PROGRESS */
    .progress-wrap { background: var(--bg2); border-radius: 10px; height: 8px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 10px; transition: width 0.5s ease; }

    /* FORM FIELDS */
    .field-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
    .field-input {
      width: 100%; padding: 10px 14px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius2); color: var(--text);
      font-size: 14px; font-family: inherit; transition: all 0.15s;
    }
    .field-input::placeholder { color: var(--text4); }

    /* PAGE HEADER */
    .page-header { margin-bottom: 28px; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .page-subtitle { font-size: 14px; color: var(--text3); }
    .page-divider { height: 2px; background: linear-gradient(90deg, var(--accent), transparent); margin: 16px 0 24px; width: 60px; border-radius: 2px; }

    /* TABLE */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { background: var(--primary-dark); color: rgba(255,255,255,0.85); padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px; letter-spacing: 0.3px; }
    .data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
    .data-table tr:hover td { background: var(--bg2); }
    .data-table tr:last-child td { border-bottom: none; }

    /* TABS */
    .tab-bar { display: flex; background: var(--bg2); border-radius: var(--radius2); padding: 4px; gap: 2px; }
    .tab-item { flex: 1; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; background: transparent; color: var(--text3); transition: all 0.15s; }
    .tab-item.active { background: var(--surface); color: var(--primary); font-weight: 700; box-shadow: var(--shadow); }

    /* ALERTS */
    .alert { padding: 12px 16px; border-radius: var(--radius2); font-size: 13px; margin-bottom: 16px; }
    .alert-success { background: #e8f8f2; border: 1px solid #0a7c5c33; color: #0a7c5c; }
    .alert-warning { background: #fef6e8; border: 1px solid #c9952a33; color: #c9952a; }
    .alert-info { background: #eef4ff; border: 1px solid #2a529833; color: var(--primary); }
    .alert-danger { background: #fef0ef; border: 1px solid #c0392b33; color: var(--danger); }

    /* LOCKED OVERLAY */
    .locked-overlay {
      background: var(--surface2); border: 2px dashed var(--border2);
      border-radius: var(--radius); padding: 48px 32px; text-align: center;
    }
    .locked-icon { font-size: 48px; margin-bottom: 12px; }
    .locked-title { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 8px; font-family: 'Playfair Display', serif; }
    .locked-desc { color: var(--text3); font-size: 14px; margin-bottom: 20px; }

    /* HERO BANNER */
    .hero-banner {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, #1a4a8a 100%);
      border-radius: var(--radius); padding: 32px 36px; color: #fff;
      position: relative; overflow: hidden; margin-bottom: 28px;
    }
    .hero-banner::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 220px; height: 220px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .hero-banner::after {
      content: ''; position: absolute; bottom: -60px; right: 60px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(201,149,42,0.08);
    }
    .hero-greeting { font-size: 13px; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; margin-bottom: 6px; }
    .hero-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .hero-sub { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
    .hero-stats { display: flex; gap: 24px; flex-wrap: wrap; }
    .hero-stat { }
    .hero-stat-val { font-size: 22px; font-weight: 700; font-family: 'Playfair Display', serif; }
    .hero-stat-label { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
    .hero-accent-line { width: 40px; height: 3px; background: var(--accent); border-radius: 2px; margin: 16px 0; }

    /* MOBILE */
    @media(max-width:900px) {
      .top-nav { display: none; }
      .main-content { padding: 20px 16px; }
    }
    @media(max-width:640px) {
      #ham-btn { display: flex; }
      .sidebar { position: fixed; top: 0; left: 0; z-index: 999; transform: translateX(-100%); width: 260px !important; height: 100vh; top: 0; }
      .sidebar.open { transform: translateX(0); box-shadow: 8px 0 32px rgba(0,0,0,0.3); }
      .main-content { padding: 72px 14px 24px !important; max-height: 100vh; }
      .top-header { padding: 0 16px; }
      .top-logo-text { font-size: 16px; }
      .hero-banner { padding: 24px 20px; }
      .hero-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div id="app-loader">
    <div class="ld-icon">🎓</div>
    <div class="ld-title">FICO Academy Gulf</div>
    <div class="ld-sub">SAP FICO Training · UAE · KSA · Gulf Region</div>
    <div class="ld-bar"><div id="lbar"></div></div>
    <div id="lmsg">Initialising…</div>
  </div>

  <button id="ham-btn" onclick="toggleSidebar()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div id="mob-ov" onclick="closeSidebar()"></div>

  <div id="root"></div>

  <script>
    function toggleSidebar(){
      var s=document.getElementById('main-sidebar');
      var o=document.getElementById('mob-ov');
      if(s)s.classList.toggle('open');
      if(o)o.classList.toggle('open');
    }
    function closeSidebar(){
      var s=document.getElementById('main-sidebar');
      var o=document.getElementById('mob-ov');
      if(s)s.classList.remove('open');
      if(o)o.classList.remove('open');
    }

    function setP(pct,msg){
      var b=document.getElementById('lbar');
      var m=document.getElementById('lmsg');
      if(b)b.style.width=pct+'%';
      if(m)m.textContent=msg;
    }
    function hideLd(){
      var l=document.getElementById('app-loader');
      if(l){l.classList.add('done');setTimeout(function(){if(l.parentNode)l.parentNode.removeChild(l);},600);}
    }
    function loadSc(src,cb){
      var s=document.createElement('script');s.src=src;
      s.onload=cb;
      s.onerror=function(){setP(100,'❌ Network error — check your internet connection.');};
      document.head.appendChild(s);
    }
    function startApp(){
      setP(72,'Compiling JSX…');
      var src=document.getElementById('jsx-src').textContent;
      setTimeout(function(){
        try{
          var js=Babel.transform(src,{presets:['react']}).code;
          setP(92,'Starting…');
          setTimeout(function(){
            try{
              // Use indirect eval so all window globals (React, ReactDOM) are in scope
              var fn=new Function('React','ReactDOM','window','document',js);
              fn(window.React,window.ReactDOM,window,document);
              setTimeout(hideLd,400);
            }
            catch(e){setP(100,'App error: '+e.message);console.error('App error:',e);}
          },30);
        }catch(e){setP(100,'Compile error: '+e.message);console.error('Compile error:',e);}
      },30);
    }

    setP(10,'Loading React…');
    loadSc('https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js',function(){
      setP(32,'Loading ReactDOM…');

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime + start);

    function AuthScreen({onLogin,lang,setLang,t}){
      const [mode,setMode]=useState("login");
      const [form,setForm]=useState({name:"",email:"",password:""});
      const [err,setErr]=useState("");
      const [loading,setLoading]=useState(false);
      async function handle(){
        setErr("");
        setLoading(true);
        // Admin login stays local
        if(form.email===defaultAdmin.email){
          if(form.password===defaultAdmin.password){
            const au={...defaultAdmin,uid:"admin"};
            saveSession(au);setLoading(false);onLogin(au);return;
          }
          setErr("Invalid email or password.");setLoading(false);return;
        }
        try{
          if(mode==="login"){
            if(window.fbAuth){
              const {signInWithEmailAndPassword}=window.fbFns;
              const cred=await signInWithEmailAndPassword(window.fbAuth,form.email,form.password);
              const fbData=await fbGet(cred.user.uid);
              const u=fbData||{name:cred.user.displayName||form.email,email:form.email,role:"free",progress:{},certUnlocked:false};
              u.uid=cred.user.uid;
              saveSession(u);setLoading(false);onLogin(u);
            } else {
              const users=getUsers();
              const u=users.find(u=>u.email===form.email&&u.password===form.password);
              if(!u){setErr("Invalid email or password.");setLoading(false);return;}
              saveSession(u);setLoading(false);onLogin(u);
            }
          } else {
            if(!form.name||!form.email||!form.password){setErr("All fields required.");setLoading(false);return;}
            if(form.password.length<6){setErr("Password must be at least 6 characters.");setLoading(false);return;}
            if(window.fbAuth){
              const {createUserWithEmailAndPassword,updateProfile}=window.fbFns;
              const cred=await createUserWithEmailAndPassword(window.fbAuth,form.email,form.password);
              await updateProfile(cred.user,{displayName:form.name});
              const nu={name:form.name,email:form.email,role:"free",progress:{},certUnlocked:false,uid:cred.user.uid,joinedAt:new Date().toISOString()};
              await fbSave(cred.user.uid,nu);
              const users=getUsers();users.push({...nu,password:form.password});saveUsers(users);
              saveSession(nu);
              localStorage.setItem("fico_new_student",JSON.stringify({name:form.name,email:form.email,time:new Date().toISOString()}));
              setLoading(false);onLogin(nu);
            } else {
              const users=getUsers();
              if(users.find(u=>u.email===form.email)){setErr("Email already registered.");setLoading(false);return;}
              const nu={name:form.name,email:form.email,password:form.password,role:"free",progress:{},certUnlocked:false};
              users.push(nu);saveUsers(users);saveSession(nu);
              localStorage.setItem("fico_new_student",JSON.stringify({name:form.name,email:form.email,time:new Date().toISOString()}));
              setLoading(false);onLogin(nu);
            }
          }
        }catch(e){
          setLoading(false);
          if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential")setErr("Invalid email or password.");
          else if(e.code==="auth/email-already-in-use")setErr("Email already registered.");
          else if(e.code==="auth/weak-password")setErr("Password must be at least 6 characters.");
          else if(e.code==="auth/invalid-email")setErr("Please enter a valid email.");
          else setErr("Connection error. Please try again.");
        }
      }
      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f2444 0%,#1a3c6e 50%,#1a4a8a 100%)",display:"flex",fontFamily:"'DM Sans',sans-serif"}}>

                {[["📚","6 Complete Modules","GL, AP, AR, CO, AA & more"],["🔬","Real Gulf Case Studies","Emaar, SABIC, Aramco scenarios"],["🎤","AI Interview Practice","Land your SAP FICO job"],["🏅","Certificate of Completion","Recognised by Gulf employers"]].map(([icon,title,desc])=>(
                  <div key={title} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
                    <span style={{fontSize:22,flexShrink:0}}>{icon}</span>
                    <div><div style={{fontWeight:600,fontSize:14}}>{title}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>{desc}</div></div>

              </div>
              <div style={{marginTop:28,padding:"12px 16px",background:"rgba(201,149,42,0.15)",border:"1px solid rgba(201,149,42,0.3)",borderRadius:10,fontSize:13,color:"rgba(255,255,255,0.8)"}}>

              </div>

          <div style={{width:420,background:"#ffffff",display:"flex",alignItems:"center",justifyContent:"center",padding:40,boxShadow:"-8px 0 40px rgba(0,0,0,0.2)"}}>
            <div style={{width:"100%",maxWidth:340}}>
              <div style={{marginBottom:28}}>

              <div>

              <div>
                <label style={{fontSize:12,fontWeight:600,color:"#3d5278",display:"block",marginBottom:5}}>{t.password}</label>
                <input placeholder="••••••••" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} style={iStyle} type="password" onKeyDown={e=>e.key==="Enter"&&handle()}/>
              </div>
              {err&&<div style={{background:"#fef0ef",border:"1px solid #c0392b33",borderRadius:8,padding:"8px 12px",color:"#c0392b",fontSize:13,marginBottom:12}}>⚠️ {err}</div>}
              {mode==="login"&&(
                <div style={{textAlign:"right",marginBottom:8}}>
                  <span onClick={async()=>{
                    if(!form.email){setErr("Enter your email first");return;}
                    try{
                      const {sendPasswordResetEmail}=window.fbFns;
                      await sendPasswordResetEmail(window.fbAuth,form.email);
                      setErr("✅ Password reset email sent! Check your inbox.");
                    }catch(e){setErr("Could not send reset email. Check your email address.");}

    function playPaymentSound(){
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Play a cheerful "cha-ching" money sound using Web Audio API
        const playTone = (freq, start, duration, type="sine", vol=0.3) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = type;
          osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
          osc.frequency.exponentialRampToValueAtTime(freq * 1.5, ctx.currentTime + start + duration * 0.3);
          gain.gain.setValueAtTime(0, ctx.currentTime + start);
          gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);
          osc.start(ctx.currentTime + start);
          osc.stop(ctx.currentTime + start + duration);
        };

        // Cha-ching melody
        playTone(523, 0.0, 0.15, "triangle", 0.4);   // C5
        playTone(659, 0.1, 0.15, "triangle", 0.4);   // E5
        playTone(784, 0.2, 0.15, "triangle", 0.4);   // G5
        playTone(1047, 0.3, 0.4, "triangle", 0.5);   // C6 (high)
        playTone(880, 0.35, 0.3, "sine", 0.3);        // A5
        playTone(1047, 0.5, 0.6, "triangle", 0.4);   // C6 (sustain)
        
        // Cash register "ding"
        playTone(2093, 0.55, 0.3, "sine", 0.2);      // C7 (ding!)
        
      } catch(e) {
        console.log("Audio not supported");
      }
    }

    // ─── ADMIN HIRING TAB ────────────────────────────────────────────────────
    function AdminHiringTab({users}){
      const HIRE_KEY="fico_hire_requests";
      const COMPANY_KEY="fico_companies";
      const [requests,setRequests]=useState(()=>lsGet(HIRE_KEY,[]));
      const [companies,setCompanies]=useState(()=>lsGet(COMPANY_KEY,[]));
      const [tab,setTab]=useState("requests");
      const [msg,setMsg]=useState("");

      function approve(id){
        const updated=requests.map(r=>r.id===id?{...r,status:"approved",approvedAt:new Date().toISOString()}:r);
        setRequests(updated);lsSet(HIRE_KEY,updated);
        setMsg("✅ Invite approved! Student will now see it.");setTimeout(()=>setMsg(""),3000);
      }
      function reject(id){
        const updated=requests.map(r=>r.id===id?{...r,status:"rejected"}:r);
        setRequests(updated);lsSet(HIRE_KEY,updated);
        setMsg("❌ Invite rejected.");setTimeout(()=>setMsg(""),3000);
      }
      function markHired(id){
        const updated=requests.map(r=>r.id===id?{...r,status:"hired",hiredAt:new Date().toISOString()}:r);
        setRequests(updated);lsSet(HIRE_KEY,updated);
        setMsg("🎉 Marked as hired! Send invoice to company (AED 1,000).");setTimeout(()=>setMsg(""),4000);
      }
      function deleteCompany(id){
        const c=companies.filter(c=>c.id!==id);setCompanies(c);lsSet(COMPANY_KEY,c);
      }

      const pending=requests.filter(r=>r.status==="pending");
      const approved=requests.filter(r=>r.status==="approved");
      const hired=requests.filter(r=>r.status==="hired");
      const totalFees=hired.length*1000;

      const statusColor={pending:"#c9952a",approved:"#0a7c5c",rejected:"#c0392b",hired:"#7c3aed"};

      return (
        <div>
          {msg&&<div style={{background:"#e8f8f2",border:"1px solid #0a7c5c33",borderRadius:10,padding:"10px 16px",color:"#0a7c5c",fontSize:13,marginBottom:16,fontWeight:600}}>{msg}</div>}

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:20}}>
            {[
              {label:"Companies",val:companies.length,icon:"🏢",color:"#1a3c6e"},
              {label:"Pending Invites",val:pending.length,icon:"⏳",color:"#c9952a"},
              {label:"Approved",val:approved.length,icon:"✅",color:"#0a7c5c"},
              {label:"Hired",val:hired.length,icon:"🎉",color:"#7c3aed"},
              {label:"Fees Earned",val:`AED ${totalFees.toLocaleString()}`,icon:"💰",color:"#0a7c5c"},
            ].map(s=>(
              <div key={s.label} style={{background:"#f8faff",border:`1px solid ${s.color}22`,borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:4}}>{s.icon}</div>
                <div style={{fontWeight:800,fontSize:16,color:s.color}}>{s.val}</div>
                <div style={{fontSize:11,color:"#6b7fa8"}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Sub tabs */}
          <div style={{display:"flex",background:"#f4f6fb",borderRadius:10,padding:3,marginBottom:16,gap:3}}>
            {[["requests","📨 Invite Requests"],["companies","🏢 Companies"],["hired","🎉 Hired"]].map(([t,l])=>(
              <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"8px 0",border:"none",borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:11,background:tab===t?"#1a3c6e":"transparent",color:tab===t?"#fff":"#6b7fa8",fontFamily:"inherit"}}>{l}</button>
            ))}
          </div>

          {tab==="requests"&&(
            <div>
              {requests.length===0?(
                <div style={{textAlign:"center",padding:40,background:"#f8faff",borderRadius:12,border:"1px dashed #dce3f0"}}>
                  <div style={{fontSize:36,marginBottom:8}}>📨</div>
                  <div style={{color:"#1a2540",fontWeight:700,marginBottom:4}}>No invite requests yet</div>
                  <div style={{color:"#6b7fa8",fontSize:13}}>When companies send interview invites, they appear here for your approval.</div>
                </div>
              ):requests.map(r=>{
                const student=users.find(u=>u.email===r.studentEmail);
                return (
                  <div key={r.id} style={{background:"#fff",border:"1px solid #dce3f0",borderRadius:12,padding:18,marginBottom:10,boxShadow:"0 1px 6px rgba(26,60,110,0.06)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:12}}>
                      <div>
                        <div style={{fontWeight:700,color:"#1a2540",fontSize:15}}>🏢 {r.companyName}</div>
                        <div style={{color:"#6b7fa8",fontSize:12,marginTop:2}}>wants to interview <strong>{r.studentName}</strong> ({r.studentEmail})</div>
                        <div style={{color:"#9aaac8",fontSize:11,marginTop:2}}>Role: {r.role} · Sent: {new Date(r.sentAt).toLocaleDateString()}</div>
                      </div>
                      <span style={{background:statusColor[r.status]+"18",color:statusColor[r.status],border:`1px solid ${statusColor[r.status]}33`,borderRadius:20,padding:"3px 12px",fontWeight:700,fontSize:11,height:"fit-content"}}>{r.status.toUpperCase()}</span>
                    </div>
                    {r.message&&<div style={{background:"#f8faff",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#3d5278",marginBottom:12,fontStyle:"italic"}}>"{r.message}"</div>}
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {r.status==="pending"&&<>
                        <button onClick={()=>approve(r.id)} style={{padding:"7px 16px",background:"#0a7c5c",color:"#fff",border:"none",borderRadius:7,fontWeight:700,fontSize:12,cursor:"pointer"}}>✅ Approve</button>
                        <button onClick={()=>reject(r.id)} style={{padding:"7px 16px",background:"#fef2f2",color:"#c0392b",border:"1px solid #c0392b33",borderRadius:7,fontWeight:700,fontSize:12,cursor:"pointer"}}>❌ Reject</button>
                      </>}
                      {r.status==="approved"&&<>
                        <button onClick={()=>markHired(r.id)} style={{padding:"7px 16px",background:"#7c3aed",color:"#fff",border:"none",borderRadius:7,fontWeight:700,fontSize:12,cursor:"pointer"}}>🎉 Mark as Hired (charge AED 1,000)</button>
                      </>}

    // ─── HIRING PORTAL (Student-facing) ──────────────────────────────────────
    function HiringPortal({user,isPremium}){
      const HIRE_KEY="fico_hire_requests";
      const COMPANY_KEY="fico_companies";
      const [tab,setTab]=useState("partners");
      const [myInvites,setMyInvites]=useState(()=>lsGet(HIRE_KEY,[]).filter(r=>r.studentEmail===user.email));
      const [openToWork,setOpenToWork]=useState(()=>lsGet("fico_otw_"+user.email,false));
      const [showRegForm,setShowRegForm]=useState(false);
      const [regForm,setRegForm]=useState({name:"",industry:"",city:"",country:"UAE",email:"",phone:"",about:""});
      const [regMsg,setRegMsg]=useState("");

      function toggleOTW(){
        const v=!openToWork;setOpenToWork(v);lsSet("fico_otw_"+user.email,v);
      }

      function submitCompanyReg(){
        if(!regForm.name||!regForm.email||!regForm.industry){setRegMsg("Please fill all required fields.");return;}
        const companies=lsGet(COMPANY_KEY,[]);
        if(companies.find(c=>c.email===regForm.email)){setRegMsg("This company email is already registered.");return;}
        const newCo={...regForm,id:Date.now(),registeredAt:new Date().toISOString(),status:"pending"};
        companies.push(newCo);lsSet(COMPANY_KEY,companies);
        setRegMsg("✅ Registered! The academy will review and activate your account.");setShowRegForm(false);
      }

      const partners=[
        {name:"Deloitte Middle East",logo:"🏛️",industry:"SAP Consulting",city:"Dubai",roles:["SAP FICO Consultant","Finance Manager","ERP Analyst"],hiring:true},
        {name:"KPMG Gulf",logo:"🏢",industry:"Audit & Consulting",city:"Abu Dhabi",roles:["SAP Finance Consultant","Business Analyst"],hiring:true},
        {name:"NTT Data UAE",logo:"💻",industry:"SAP Implementation",city:"Dubai",roles:["SAP FICO Junior Consultant","S/4HANA Specialist"],hiring:true},
        {name:"Emaar Properties",logo:"🏗️",industry:"Real Estate",city:"Dubai",roles:["SAP FICO Analyst","Finance Systems Lead"],hiring:false},
        {name:"ADNOC Group",logo:"⚡",industry:"Oil & Gas",city:"Abu Dhabi",roles:["SAP Finance Analyst","GL Accountant"],hiring:false},
        {name:"Al Futtaim Group",logo:"🌟",industry:"Retail & Automotive",city:"Dubai",roles:["ERP Finance Analyst","SAP FICO Consultant"],hiring:false},
      ];

      const statusColor={pending:"#c9952a",approved:"#0a7c5c",rejected:"#c0392b",hired:"#7c3aed"};

      return (
        <div style={{maxWidth:800,margin:"0 auto"}}>
          {/* Header */}

            <div style={{position:"absolute",right:-20,top:-20,fontSize:100,opacity:0.07}}>💼</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,marginBottom:6}}>💼 FICO Academy Hiring Hub</div>
            <div style={{fontSize:13,opacity:0.8,marginBottom:20}}>Connect with top UAE & Gulf companies hiring SAP FICO professionals</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"12px 16px",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>Your Profile Visibility</div>

              </div>
              <button onClick={toggleOTW} style={{padding:"8px 20px",background:openToWork?"#22c55e":"rgba(255,255,255,0.2)",border:"none",borderRadius:8,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>
                {openToWork?"🟢 Open to Work":"⚫ Hidden — Turn On"}
              </button>
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",background:"#f4f6fb",borderRadius:12,padding:4,marginBottom:20,gap:4}}>

              <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"9px 6px",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:11,background:tab===t?"#1a3c6e":"transparent",color:tab===t?"#fff":"#6b7fa8",fontFamily:"inherit"}}>{l}</button>
            ))}

          {/* Hiring Partners */}

                🌟 <strong>Coming Soon:</strong> Direct company connections are launching soon. Turn on "Open to Work" above so companies can find you first!

              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
                {partners.map(p=>(
                  <div key={p.name} style={{background:"#fff",border:"1px solid #dce3f0",borderRadius:12,padding:20,boxShadow:"0 1px 6px rgba(26,60,110,0.06)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                      <div style={{display:"flex",gap:12,alignItems:"center"}}>
                        <div style={{fontSize:32}}>{p.logo}</div>
                        <div>
                          <div style={{fontWeight:700,color:"#1a2540",fontSize:14}}>{p.name}</div>
                          <div style={{color:"#6b7fa8",fontSize:12}}>{p.industry} · {p.city}</div>
                        </div>
                      </div>
                      <span style={{background:p.hiring?"#e8f8f2":"#f4f6fb",color:p.hiring?"#0a7c5c":"#9aaac8",border:`1px solid ${p.hiring?"#0a7c5c33":"#dce3f0"}`,borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:700,flexShrink:0}}>{p.hiring?"🟢 Actively Hiring":"Coming Soon"}</span>
                    </div>
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#9aaac8",marginBottom:6}}>OPEN ROLES</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {p.roles.map(r=><span key={r} style={{background:"#f4f6fb",color:"#3d5278",borderRadius:6,padding:"3px 10px",fontSize:11,border:"1px solid #dce3f0"}}>{r}</span>)}
                      </div>
                    </div>
                    <div style={{fontSize:12,color:"#6b7fa8",background:"#f8faff",borderRadius:8,padding:"8px 12px"}}>
                      {p.hiring?"✅ Turn on 'Open to Work' above — company can invite you directly when live.":"🔜 Partnership being finalized. Stay ready!"}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* My Invites */}
          {tab==="invites"&&(
            <div>
              {myInvites.length===0?(
                <div style={{textAlign:"center",padding:48,background:"#f8faff",borderRadius:12,border:"1px dashed #dce3f0"}}>
                  <div style={{fontSize:42,marginBottom:12}}>📨</div>
                  <div style={{fontWeight:700,color:"#1a2540",marginBottom:6}}>No interview invites yet</div>
                  <div style={{color:"#6b7fa8",fontSize:13,marginBottom:16}}>Turn on "Open to Work" on the top of this page so companies can find and invite you.</div>

                </div>
              ):myInvites.map(r=>(
                <div key={r.id} style={{background:"#fff",border:`2px solid ${statusColor[r.status]}33`,borderRadius:12,padding:20,marginBottom:12,boxShadow:"0 1px 8px rgba(26,60,110,0.07)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:10}}>
                    <div>
                      <div style={{fontWeight:700,color:"#1a2540",fontSize:15}}>🏢 {r.companyName}</div>
                      <div style={{color:"#6b7fa8",fontSize:13,marginTop:2}}>Role: <strong>{r.role}</strong></div>
                      <div style={{color:"#9aaac8",fontSize:11,marginTop:2}}>Received: {new Date(r.sentAt).toLocaleDateString()}</div>
                    </div>
                    <span style={{background:statusColor[r.status]+"18",color:statusColor[r.status],border:`1px solid ${statusColor[r.status]}33`,borderRadius:20,padding:"4px 14px",fontWeight:700,fontSize:12}}>{statusIcon[r.status]} {r.status.toUpperCase()}</span>
                  </div>
                  {r.message&&<div style={{background:"#f8faff",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#3d5278",fontStyle:"italic",marginBottom:10}}>"{r.message}"</div>}
                  {r.status==="approved"&&(
                    <div style={{background:"#e8f8f2",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#0a7c5c",fontWeight:600}}>
                      ✅ Invite approved by academy! The company will contact you at <strong>{user.email}</strong>. Prepare well! 🎯
                    </div>
                  )}
                  {r.status==="pending"&&<div style={{fontSize:12,color:"#c9952a"}}>⏳ Waiting for academy approval — you'll be notified soon.</div>}
                  {r.status==="hired"&&<div style={{fontSize:13,color:"#7c3aed",fontWeight:700}}>🎉 Congratulations on your new role!</div>}
                </div>
              ))}
            </div>
          )}

          {/* Register Company */}
          {tab==="register"&&(
            <div>
              <div style={{background:"#fff",border:"1px solid #dce3f0",borderRadius:14,padding:28,boxShadow:"0 2px 12px rgba(26,60,110,0.07)"}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#1a2540",marginBottom:4}}>🏢 Register Your Company</div>
                <p style={{color:"#6b7fa8",fontSize:13,marginBottom:24}}>Join FICO Academy Gulf's hiring network. Browse verified SAP FICO graduates and send interview invites. <strong style={{color:"#1a3c6e"}}>Pay AED 1,000 only when you hire.</strong></p>
                {regMsg&&<div style={{padding:"10px 14px",borderRadius:8,marginBottom:16,background:regMsg.startsWith("✅")?"#e8f8f2":"#fef2f2",color:regMsg.startsWith("✅")?"#0a7c5c":"#c0392b",fontSize:13,fontWeight:600}}>{regMsg}</div>}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14,marginBottom:16}}>
                  {[
                    {id:"name",label:"Company Name *",placeholder:"e.g. Gulf Trading LLC"},
                    {id:"industry",label:"Industry *",placeholder:"e.g. SAP Consulting, Oil & Gas"},
                    {id:"city",label:"City *",placeholder:"e.g. Dubai"},
                    {id:"country",label:"Country",placeholder:"e.g. UAE"},
                    {id:"email",label:"HR Email *",placeholder:"hr@yourcompany.com"},
                    {id:"phone",label:"Phone / WhatsApp",placeholder:"+971 50 000 0000"},
                  ].map(f=>(
                    <div key={f.id}>
                      <label style={{display:"block",fontSize:12,fontWeight:700,color:"#3d5278",marginBottom:4}}>{f.label}</label>
                      <input value={regForm[f.id]} onChange={e=>setRegForm(p=>({...p,[f.id]:e.target.value}))} placeholder={f.placeholder} style={{width:"100%",padding:"9px 12px",border:"1.5px solid #dce3f0",borderRadius:7,fontSize:13,fontFamily:"inherit",color:"#1a2540",boxSizing:"border-box"}}/>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:20}}>
                  <label style={{display:"block",fontSize:12,fontWeight:700,color:"#3d5278",marginBottom:4}}>About Your Company</label>
                  <textarea value={regForm.about} onChange={e=>setRegForm(p=>({...p,about:e.target.value}))} placeholder="Tell students about your company, culture, and what roles you hire for..." style={{width:"100%",minHeight:80,padding:"10px 12px",border:"1.5px solid #dce3f0",borderRadius:7,fontSize:13,fontFamily:"inherit",color:"#1a2540",resize:"vertical",boxSizing:"border-box"}}/>
                </div>
                <div style={{background:"#f8faff",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#6b7fa8",lineHeight:1.8}}>

                <button onClick={submitCompanyReg} style={{width:"100%",padding:"13px 0",background:"linear-gradient(135deg,#1a3c6e,#2a5298)",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:15,cursor:"pointer"}}>
                  🏢 Submit Registration
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

          {q:"What is asset retirement in SAP?",options:["Buying a new asset","Removing an asset from books (sale or scrapping)","Running depreciation","Transferring asset between plants"],ans:1,exp:"Asset retirement removes a fixed asset from the books — either through sale (ABAON) or scrapping (ABAVN)."},
        ]
      },
    ];

    function PlacementAssessment({user,isPremium}){
      const PA_RESULT_KEY="fico_pa_result_"+user.email;
      const [phase,setPhase]=useState("intro"); // intro | info | test | result
      const [info,setInfo]=useState({name:user.name||"",email:user.email||"",phone:"",experience:"",location:"",targetRole:""});
      const [secIdx,setSecIdx]=useState(0);
      const [qIdx,setQIdx]=useState(0);
      const [answers,setAnswers]=useState({});
      const [selected,setSelected]=useState(null);
      const [showExp,setShowExp]=useState(false);
      const [result,setResult]=useState(()=>lsGet(PA_RESULT_KEY,null));
      const [timer,setTimer]=useState(30);
      const [timerActive,setTimerActive]=useState(false);

      useEffect(()=>{
        if(!timerActive||phase!=="test")return;
        if(timer<=0){handleNext();return;}
        const id=setTimeout(()=>setTimer(t=>t-1),1000);
        return()=>clearTimeout(id);
      },[timer,timerActive,phase]);

      function startTest(){
        if(!info.name||!info.phone||!info.experience||!info.location){alert("Please fill all fields.");return;}
        setPhase("test");setSecIdx(0);setQIdx(0);setSelected(null);setShowExp(false);setTimer(30);setTimerActive(true);
      }

      function handleSelect(idx){
        if(selected!==null)return;
        setSelected(idx);setTimerActive(false);setShowExp(true);
        const key=`${secIdx}_${qIdx}`;
        setAnswers(a=>({...a,[key]:idx}));
      }

      function handleNext(){
        const sec=placementSections[secIdx];
        setShowExp(false);setSelected(null);setTimer(30);setTimerActive(true);
        if(qIdx+1<sec.questions.length){setQIdx(q=>q+1);}
        else if(secIdx+1<placementSections.length){setSecIdx(s=>s+1);setQIdx(0);}
        else{finishTest();}
      }

      function finishTest(){
        setTimerActive(false);
        let scores={};let total=0;let correct=0;
        placementSections.forEach((sec,si)=>{
          let sc=0;
          sec.questions.forEach((q,qi)=>{
            const k=`${si}_${qi}`;
            if(answers[k]===q.ans)sc++;
          });
          scores[sec.id]={score:sc,total:sec.questions.length,pct:Math.round(sc/sec.questions.length*100)};
          correct+=sc;total+=sec.questions.length;
        });
        const overall=Math.round(correct/total*100);
        const level=overall>=80?"Senior Consultant":overall>=65?"Junior Consultant":overall>=50?"Trainee":"Beginner";
        const res={info,scores,overall,level,correct,total,date:new Date().toISOString()};
        setResult(res);lsSet(PA_RESULT_KEY,res);

        // Save to shared placement results for admin
        const all=lsGet(PA_KEY,[]);
        const existing=all.findIndex(r=>r.info.email===user.email);
        if(existing>=0)all[existing]=res;else all.push(res);
        lsSet(PA_KEY,all);
        setPhase("result");
      }

      const levelColor={Senior:"#7c3aed","Junior":"#0a7c5c","Trainee":"#c9952a","Beginner":"#c0392b"};
      const getLevelColor=(l)=>Object.entries(levelColor).find(([k])=>l.startsWith(k))?.[1]||"#1a3c6e";

      // ── INTRO ────────────────────────────────────────────────────────────────
      if(phase==="intro") return (
        <div style={{maxWidth:700,margin:"0 auto"}}>
          {result&&(
            <div style={{background:"linear-gradient(135deg,#f5f0ff,#fff)",border:"2px solid #7c3aed33",borderRadius:14,padding:20,marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontWeight:700,color:"#7c3aed",fontSize:14}}>🎯 Last Assessment: {result.level}</div>
                <div style={{color:"#6b7fa8",fontSize:12,marginTop:2}}>Score: {result.overall}% · {new Date(result.date).toLocaleDateString()}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setPhase("result")} style={{padding:"7px 16px",background:"#7c3aed",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer"}}>View Results</button>
                <button onClick={()=>{setResult(null);setPhase("info");}} style={{padding:"7px 16px",background:"#f4f6fb",color:"#1a2540",border:"1px solid #dce3f0",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer"}}>Retake</button>
              </div>
            </div>
          )}
          <div style={{background:"linear-gradient(135deg,#1a3c6e,#2a5298)",borderRadius:16,padding:"32px 28px",color:"#fff",marginBottom:20,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",right:-10,top:-10,fontSize:100,opacity:0.07}}>🎯</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,marginBottom:8}}>🎯 SAP FICO Placement Assessment</div>
            <p style={{opacity:0.85,fontSize:14,lineHeight:1.7,marginBottom:20}}>Test your SAP FICO knowledge across all 5 modules. Get a professional readiness score, level badge, and module-wise breakdown — shareable with hiring companies.</p>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              {[["30","Questions"],["5","Modules"],["30s","Per Question"],["Free","No Cost"]].map(([v,l])=>(
                <div key={l} style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"10px 16px",textAlign:"center",minWidth:70}}>
                  <div style={{fontWeight:800,fontSize:18}}>{v}</div>
                  <div style={{fontSize:11,opacity:0.8}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:24}}>
            {placementSections.map(s=>(
              <div key={s.id} style={{background:"#fff",border:`2px solid ${s.color}22`,borderRadius:12,padding:"16px 18px",display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:28}}>{s.icon}</span>
                <div>
                  <div style={{fontWeight:700,color:"#1a2540",fontSize:13}}>{s.title}</div>
                  <div style={{fontSize:11,color:"#6b7fa8"}}>{s.questions.length} questions</div>
                </div>
              </div>
            ))}
          </div>
          <button onClick={()=>setPhase("info")} style={{width:"100%",padding:"14px 0",background:"linear-gradient(135deg,#1a3c6e,#2a5298)",color:"#fff",border:"none",borderRadius:12,fontWeight:800,fontSize:16,cursor:"pointer"}}>
            🚀 Start Assessment
          </button>
        </div>
      );

      // ── INFO FORM ────────────────────────────────────────────────────────────
      if(phase==="info") return (
        <div style={{maxWidth:580,margin:"0 auto"}}>
          <div style={{background:"#fff",border:"1px solid #dce3f0",borderRadius:14,padding:28,boxShadow:"0 2px 12px rgba(26,60,110,0.07)"}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#1a2540",marginBottom:4}}>📋 Your Details</div>
            <p style={{color:"#6b7fa8",fontSize:13,marginBottom:24}}>This info will be included in your assessment report shared with hiring companies.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
              {[
                {id:"name",label:"Full Name *",placeholder:"Your full name"},
                {id:"phone",label:"Phone / WhatsApp *",placeholder:"+971 50 000 0000"},
                {id:"email",label:"Email",placeholder:user.email,disabled:true},
                {id:"location",label:"City / Country *",placeholder:"e.g. Dubai, UAE"},
                {id:"experience",label:"SAP Experience *",placeholder:"e.g. 0 years / 2 years"},
                {id:"targetRole",label:"Target Job Role",placeholder:"e.g. SAP FICO Consultant"},
              ].map(f=>(
                <div key={f.id} style={{gridColumn:f.id==="name"?"1/-1":"auto"}}>
                  <label style={{display:"block",fontSize:12,fontWeight:700,color:"#3d5278",marginBottom:4}}>{f.label}</label>
                  <input value={info[f.id]||""} onChange={e=>setInfo(p=>({...p,[f.id]:e.target.value}))} placeholder={f.placeholder} disabled={f.disabled} style={{width:"100%",padding:"9px 12px",border:"1.5px solid #dce3f0",borderRadius:7,fontSize:13,fontFamily:"inherit",color:"#1a2540",background:f.disabled?"#f8faff":"#fff",boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>
            <div style={{background:"#f8faff",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:12,color:"#6b7fa8",lineHeight:1.8}}>
              ⏱️ <strong>Test rules:</strong> 30 questions · 30 seconds each · No going back · Results shared with hiring partners if you opt in
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setPhase("intro")} style={{padding:"11px 20px",background:"#f4f6fb",color:"#1a2540",border:"1px solid #dce3f0",borderRadius:8,fontWeight:700,cursor:"pointer"}}>← Back</button>
              <button onClick={startTest} style={{flex:1,padding:"11px 0",background:"linear-gradient(135deg,#1a3c6e,#2a5298)",color:"#fff",border:"none",borderRadius:8,fontWeight:800,fontSize:14,cursor:"pointer"}}>Begin Test →</button>
            </div>
          </div>
        </div>
      );

      // ── TEST ─────────────────────────────────────────────────────────────────
      if(phase==="test"){
        const sec=placementSections[secIdx];
        const q=sec.questions[qIdx];
        const totalQ=placementSections.reduce((a,s)=>a+s.questions.length,0);
        const doneQ=placementSections.slice(0,secIdx).reduce((a,s)=>a+s.questions.length,0)+qIdx;
        const progress=Math.round(doneQ/totalQ*100);
        const timerColor=timer<=10?"#c0392b":timer<=20?"#c9952a":"#0a7c5c";
        return (
          <div style={{maxWidth:680,margin:"0 auto"}}>
            {/* Progress bar */}
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:6}}>
                <span style={{background:sec.color+"18",color:sec.color,border:`1px solid ${sec.color}33`,borderRadius:20,padding:"3px 12px",fontWeight:700,fontSize:12}}>{sec.icon} {sec.title}</span>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#6b7fa8"}}>Q {doneQ+1} / {totalQ}</span>
                  <div style={{background:timerColor+"18",color:timerColor,border:`1px solid ${timerColor}33`,borderRadius:20,padding:"3px 12px",fontWeight:800,fontSize:13,minWidth:48,textAlign:"center"}}>⏱ {timer}s</div>
                </div>
              </div>
              <div style={{background:"#f0f4ff",borderRadius:20,height:6,overflow:"hidden"}}>
                <div style={{width:progress+"%",height:"100%",background:`linear-gradient(90deg,${sec.color},#2a5298)`,borderRadius:20,transition:"width 0.3s"}}/>
              </div>
            </div>
            {/* Section tabs */}
            <div style={{display:"flex",gap:4,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
              {placementSections.map((s,i)=>(
                <div key={s.id} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:700,background:i===secIdx?s.color:i<secIdx?"#e8f8f2":"#f4f6fb",color:i===secIdx?"#fff":i<secIdx?"#0a7c5c":"#9aaac8",border:`1px solid ${i===secIdx?s.color:i<secIdx?"#0a7c5c33":"#dce3f0"}`}}>
                  {i<secIdx?"✅ ":""}{s.icon} {s.title.split(" ")[0]}
                </div>
              ))}
            </div>
            {/* Question card */}
            <div style={{background:"#fff",borderRadius:14,padding:28,border:"1px solid #dce3f0",boxShadow:"0 2px 16px rgba(26,60,110,0.08)",marginBottom:14}}>
              <div style={{background:sec.color+"10",borderLeft:`4px solid ${sec.color}`,borderRadius:"0 8px 8px 0",padding:"14px 18px",marginBottom:22}}>
                <div style={{fontWeight:700,fontSize:15,color:"#1a2540",lineHeight:1.6}}>{q.q}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {q.options.map((opt,i)=>{
                  let bg="#f8faff",border="1.5px solid #dce3f0",color="#1a2540";
                  if(selected!==null){
                    if(i===q.ans){bg="#e8f8f2";border="2px solid #0a7c5c";color="#0a7c5c";}
                    else if(i===selected&&selected!==q.ans){bg="#fef2f2";border="2px solid #c0392b";color="#c0392b";}
                  }
                  return (
                    <button key={i} onClick={()=>handleSelect(i)} disabled={selected!==null} style={{padding:"13px 16px",background:bg,border,borderRadius:10,color,fontWeight:600,fontSize:13,cursor:selected!==null?"default":"pointer",textAlign:"left",fontFamily:"inherit",transition:"all 0.2s",display:"flex",alignItems:"center",gap:10}}>
                      <span style={{background:selected!==null&&i===q.ans?"#0a7c5c":selected===i&&i!==q.ans?"#c0392b":sec.color+"22",color:selected!==null&&i===q.ans?"#fff":selected===i&&i!==q.ans?"#fff":sec.color,borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0}}>
                        {selected!==null&&i===q.ans?"✓":selected===i&&i!==q.ans?"✗":["A","B","C","D"][i]}
                      </span>
                      {opt}
                    </button>
                  );
                })}
              </div>
            </div>
            {showExp&&(
              <div style={{background:"#fffbeb",border:"1px solid #c9952a33",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#92400e",lineHeight:1.7}}>
                💡 <strong>Explanation:</strong> {q.exp}
              </div>
            )}
            {selected!==null&&(
              <button onClick={handleNext} style={{width:"100%",padding:"13px 0",background:`linear-gradient(135deg,${sec.color},${sec.color}cc)`,color:"#fff",border:"none",borderRadius:10,fontWeight:800,fontSize:14,cursor:"pointer"}}>
                {secIdx===placementSections.length-1&&qIdx===sec.questions.length-1?"🏁 Finish & See Results":"Next Question →"}
              </button>
            )}
          </div>
        );
      }

      // ── RESULT ───────────────────────────────────────────────────────────────
      if(phase==="result"&&result){
        const lc=getLevelColor(result.level);
        const [shareOpt,setShareOpt]=useState(false);
        return (
          <div style={{maxWidth:700,margin:"0 auto"}}>
            {/* Header result card */}
            <div style={{background:`linear-gradient(135deg,${lc},${lc}cc)`,borderRadius:16,padding:"32px 28px",color:"#fff",textAlign:"center",marginBottom:20,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",right:-20,top:-20,fontSize:120,opacity:0.07}}>🎯</div>
              <div style={{fontSize:52,marginBottom:8}}>{result.overall>=80?"🏆":result.overall>=65?"🎯":result.overall>=50?"📚":"💪"}</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,marginBottom:4}}>{result.level}</div>
              <div style={{fontSize:42,fontWeight:800,margin:"8px 0"}}>{result.overall}%</div>
              <div style={{opacity:0.85,fontSize:13}}>Correct: {result.correct} / {result.total} questions · {new Date(result.date).toLocaleDateString()}</div>
            </div>

            {/* Module breakdown */}
            <div style={{background:"#fff",borderRadius:14,padding:24,border:"1px solid #dce3f0",boxShadow:"0 2px 12px rgba(26,60,110,0.07)",marginBottom:16}}>
              <div style={{fontWeight:700,color:"#1a2540",fontSize:15,marginBottom:16}}>📊 Module-wise Breakdown</div>
              {placementSections.map(s=>{
                const sc=result.scores[s.id]||{score:0,total:s.questions.length,pct:0};
                const badge=sc.pct>=80?"Strong":sc.pct>=60?"Good":sc.pct>=40?"Fair":"Needs Work";
                const badgeColor=sc.pct>=80?"#0a7c5c":sc.pct>=60?"#1a3c6e":sc.pct>=40?"#c9952a":"#c0392b";
                return (
                  <div key={s.id} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <span>{s.icon}</span>
                        <span style={{fontWeight:600,fontSize:13,color:"#1a2540"}}>{s.title}</span>
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <span style={{background:badgeColor+"18",color:badgeColor,border:`1px solid ${badgeColor}33`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>{badge}</span>
                        <span style={{fontWeight:700,color:s.color,fontSize:13}}>{sc.score}/{sc.total}</span>
                      </div>
                    </div>
                    <div style={{background:"#f0f4ff",borderRadius:20,height:8,overflow:"hidden"}}>
                      <div style={{width:sc.pct+"%",height:"100%",background:`linear-gradient(90deg,${s.color},${s.color}99)`,borderRadius:20,transition:"width 0.6s"}}/>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Recommendation */}
            <div style={{background:"#f8faff",border:"1px solid #dce3f0",borderRadius:12,padding:20,marginBottom:16}}>
              <div style={{fontWeight:700,color:"#1a2540",marginBottom:8}}>💡 Recommendations</div>
              <div style={{fontSize:13,color:"#3d5278",lineHeight:1.8}}>
                {result.overall>=80&&"🌟 Excellent! You are ready for Senior SAP FICO Consultant roles. Apply to top-tier SAP partners like Deloitte, Accenture, or NTT Data."}
                {result.overall>=65&&result.overall<80&&"✅ Good score! You qualify for Junior Consultant positions. Focus on your weaker modules and gain hands-on experience."}
                {result.overall>=50&&result.overall<65&&"📚 Fair knowledge. You're at Trainee level — enroll in the premium modules and retake in 2-4 weeks."}
                {result.overall<50&&"💪 Keep going! Complete all free modules in the academy first, then retake this assessment."}
              </div>
            </div>

            {/* Share with companies */}
            <div style={{background:"linear-gradient(135deg,#f0f7ff,#fff)",border:"2px solid #1a3c6e22",borderRadius:12,padding:20,marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{fontWeight:700,color:"#1a2540",fontSize:14}}>🏢 Share with Hiring Companies</div>
                  <div style={{color:"#6b7fa8",fontSize:12,marginTop:2}}>Allow FICO Academy to share your result with partner companies looking for SAP talent</div>
                </div>
                <button onClick={()=>{setShareOpt(!shareOpt);}} style={{padding:"9px 20px",background:shareOpt?"#0a7c5c":"linear-gradient(135deg,#1a3c6e,#2a5298)",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:13}}>
                  {shareOpt?"✅ Shared!":"📤 Share Profile"}
                </button>
              </div>
              {shareOpt&&<div style={{marginTop:12,background:"#e8f8f2",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#0a7c5c",fontWeight:600}}>✅ Your placement result ({result.level} — {result.overall}%) is now visible to partner companies. They will contact you at {result.info.email}.</div>}
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setPhase("intro");}} style={{flex:1,padding:"11px 0",background:"#f4f6fb",color:"#1a2540",border:"1px solid #dce3f0",borderRadius:8,fontWeight:700,cursor:"pointer"}}>← Back</button>
              <button onClick={()=>{setResult(null);setAnswers({});setPhase("info");}} style={{flex:1,padding:"11px 0",background:"linear-gradient(135deg,#1a3c6e,#2a5298)",color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>🔄 Retake Assessment</button>
            </div>
          </div>
        );
      }
      return null;
    }

    const ACCESS_KEY="fico_access_requests";

    function AdminProjectsTab(){
      const [projects,setProjects]=useState(()=>lsGet(PROJ_KEY,defaultProjects));
      const [submissions,setSubmissions]=useState(()=>lsGet(PROJ_SUB_KEY,[]));
      const [accessReqs,setAccessReqs]=useState(()=>lsGet(ACCESS_KEY,[]));
      const [tab,setTab]=useState("submissions");
      const [msg,setMsg]=useState("");

      function reviewSub(id,status){
        const updated=submissions.map(s=>s.id===id?{...s,status,reviewedAt:new Date().toISOString()}:s);
        setSubmissions(updated);lsSet(PROJ_SUB_KEY,updated);
      }
      function deleteProject(id){
        const updated=projects.filter(p=>p.id!==id);
        setProjects(updated);lsSet(PROJ_KEY,updated);
      }
      function approveAccess(id){
        const updated=accessReqs.map(r=>r.id===id?{...r,status:"approved",approvedAt:new Date().toISOString()}:r);
        setAccessReqs(updated);lsSet(ACCESS_KEY,updated);
        setMsg("✅ Access approved! Company can now view full student profiles & submissions.");
        setTimeout(()=>setMsg(""),3000);
      }
      function markAccessPaid(id){
        const updated=accessReqs.map(r=>r.id===id?{...r,paid:true,paidAt:new Date().toISOString()}:r);

        setMsg("💰 Payment marked as received!");setTimeout(()=>setMsg(""),3000);
      }
      function rejectAccess(id){
        const updated=accessReqs.map(r=>r.id===id?{...r,status:"rejected"}:r);
        setAccessReqs(updated);lsSet(ACCESS_KEY,updated);
      }

      const statusColor={submitted:"#c9952a",approved:"#0a7c5c",rejected:"#c0392b",pending:"#6b7fa8"};
      const totalRevenue=accessReqs.filter(r=>r.paid).reduce((a,r)=>a+r.amount,0);

      return (

            ))}
          </div>

          {/* SUBMISSIONS TAB */}
          {tab==="submissions"&&(

                <div style={{fontWeight:700,color:"#1a2540"}}>No submissions yet</div>
                <div style={{color:"#6b7fa8",fontSize:13,marginTop:4}}>Students will appear here when they submit projects.</div>

            ):submissions.sort((a,b)=>b.quizScore-a.quizScore).map(s=>(

                {s.quizScore>=80&&<div style={{position:"absolute",top:0,right:0,background:"linear-gradient(135deg,#7c3aed,#9b59b6)",color:"#fff",fontSize:10,fontWeight:700,padding:"4px 12px",borderRadius:"0 12px 0 8px"}}>⭐ TOP STUDENT</div>}
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:10}}>

                    <div style={{textAlign:"right"}}>

                    </div>
                  </div>
                  <div style={{background:"#f8faff",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#3d5278"}}>
                    <strong>Access tier:</strong> {r.tier} — {r.tierDesc}<br/>

                  </div>
                  {r.status==="pending"&&(
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

                          Account Name: <strong>Kulsoom Fatima</strong><br/>
                          IBAN: <strong>AE33 0330 0000 1910 2156 114</strong><br/>
                          Bank: <strong>Mashreq Neo</strong><br/>
                          Amount: <strong>AED {r.amount.toLocaleString()}</strong><br/>

                        </div>
                        <button onClick={()=>markAccessPaid(r.id)} style={{padding:"8px 18px",background:"#7c3aed",color:"#fff",border:"none",borderRadius:7,fontWeight:700,fontSize:12,cursor:"pointer"}}>💰 Mark Paid</button>

                  {r.status==="approved"&&r.paid&&(
                    <div style={{background:"#e8f8f2",borderRadius:8,padding:"8px 14px",fontSize:12,color:"#0a7c5c",fontWeight:700}}>
                      💰 Payment received on {new Date(r.paidAt).toLocaleDateString()} · AED {r.amount.toLocaleString()} earned ✅
                    </div>

            </div>
          )}

          {/* PROJECTS TAB */}
          {tab==="projects"&&(
            projects.map(p=>(
              <div key={p.id} style={{background:"#fff",border:"1px solid #dce3f0",borderRadius:12,padding:16,marginBottom:10}}>

                    <div style={{fontWeight:700,color:"#1a2540",fontSize:14}}>{p.companyIcon} {p.title}</div>

                    <div style={{color:"#9aaac8",fontSize:11,marginTop:2}}>Deadline: {new Date(p.deadline).toLocaleDateString()} · {submissions.filter(s=>s.projectId===p.id).length} submissions · Top students: {submissions.filter(s=>s.projectId===p.id&&s.quizScore>=80).length}</div>
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <span style={{background:p.type==="company"?"#1a3c6e18":"#7c3aed18",color:p.type==="company"?"#1a3c6e":"#7c3aed",borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:700}}>{p.type==="company"?"🏢 Company":"🎓 Sim"}</span>
                    {p.type==="company"&&<button onClick={()=>deleteProject(p.id)} style={{padding:"4px 10px",background:"#fef2f2",color:"#c0392b",border:"1px solid #c0392b33",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>🗑</button>}
                  </div>
                </div>
              </div>
            ))
          )}
        </div>

    const interviewQuestions = {
      Beginner: [
        { q:"What is SAP FICO and what are its two main components?", ideal:"SAP FICO stands for Financial Accounting (FI) and Controlling (CO). FI handles external financial reporting including balance sheet and P&L statements. CO handles internal management reporting including cost centers, profit centers and internal orders.", keywords:["financial accounting","controlling","FI","CO","balance sheet","P&L"] },
        { q:"What is a Company Code in SAP?", ideal:"A Company Code is the smallest organizational unit for which a complete set of accounts can be drawn up. It represents a legal entity and is used for external financial reporting. Each company code has its own chart of accounts, fiscal year variant and currency.", keywords:["legal entity","organizational unit","financial reporting","chart of accounts","fiscal year"] },
        { q:"What is the difference between a Chart of Accounts and a Company Code?", ideal:"A Chart of Accounts is a list of all GL accounts used by one or more company codes. Multiple company codes can share the same chart of accounts. The company code is the legal entity that uses those accounts for its financial reporting.", keywords:["chart of accounts","GL accounts","company code","legal entity","share"] },
        { q:"What is a Posting Key in SAP FI?", ideal:"A posting key is a two-digit numerical key that controls the entry of line items in SAP. It determines the account type, debit or credit posting, and which fields are required or optional during document entry. For example, posting key 40 is debit GL account and 50 is credit GL account.", keywords:["two-digit","debit","credit","account type","field selection","40","50"] },
        { q:"What is the document principle in SAP?", ideal:"The document principle means every business transaction in SAP creates a document that remains in the system permanently. Each document has a unique document number, contains header information like date and company code, and line items showing the accounts affected. Documents cannot be deleted, only reversed.", keywords:["document","permanent","unique number","header","line items","reversed","cannot be deleted"] },
        { q:"What is a Reconciliation Account?", ideal:"A reconciliation account is a GL account that is automatically updated when transactions are posted to a subledger account such as a vendor or customer. It links the accounts payable or accounts receivable subledger to the general ledger, ensuring they are always in balance.", keywords:["GL account","subledger","vendor","customer","automatically","balance","links"] },

        { q:"What is the difference between parking and holding a document?", ideal:"A parked document is an incomplete document saved in SAP that updates reports and can be seen by others. It can be completed and posted later. A held document is saved locally only for the person who created it, does not update any reports, and is not visible to others.", keywords:["parked","held","incomplete","reports","visible","locally","FBV0","FB00"] },
        { q:"What is a Tolerance Group in SAP AP?", ideal:"A tolerance group defines the acceptable variance between a purchase order amount and the vendor invoice amount. If the invoice exceeds the tolerance limit, SAP automatically blocks it for payment. This is configured in MIRO for three-way match scenarios.", keywords:["variance","purchase order","invoice","blocked","tolerance limit","MIRO","acceptable"] },
        { q:"Explain the dunning process in SAP AR.", ideal:"Dunning is the process of sending payment reminders to customers with overdue invoices. The dunning program F150 has multiple levels, where level 1 is a gentle reminder and level 4 is a final legal notice. The process involves entering parameters, running a proposal, editing it, and printing or emailing dunning notices.", keywords:["F150","dunning levels","overdue","reminder","proposal","legal notice","customer","payment"] },

    function InterviewSim({isPremium}){

        if(!answer.trim())return;
        const q=interviewQuestions[level][qIndex];
        const ans=answer.toLowerCase();
        const hits=q.keywords.filter(k=>ans.includes(k.toLowerCase()));
        const pct=Math.round((hits.length/q.keywords.length)*100);
        const passed=pct>=50;
        if(passed)setScore(s=>s+1);
        setFeedback({passed,pct,hits,ideal:q.ideal,keywords:q.keywords});
      }
      function nextQ(){
        const qs=interviewQuestions[level];
        if(qIndex+1>=qs.length){setDone(true);}
        else{setQIndex(i=>i+1);setAnswer("");setFeedback(null);}

          </div>
          {feedback&&(

              <div style={{marginBottom:14}}>

                  ))}

              </div>
              <button onClick={nextQ} style={{width:"100%",padding:"11px 0",background:"linear-gradient(135deg,#1a3c6e,#2a5298)",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>{qIndex+1>=qs.length?"See Results 🏆":"Next Question →"}</button>
            </div>
          )}
        </div>
